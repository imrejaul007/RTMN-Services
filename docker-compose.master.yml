# ===================================================================
# RTMN Master Docker Compose - All Services
# ===================================================================
# Brings up: 26 SutAR + 13 HOJAI + 60+ RABTUL + Monitoring
# Use: docker-compose -f docker-compose.master.yml up -d
# ===================================================================

version: '3.9'

# ---- Networks ----
networks:
  rtmn-network:
    driver: bridge
    name: rtmn-network

# ---- Volumes ----
volumes:
  mongo-data:
  redis-data:
  prometheus-data:
  grafana-data:

# ---- Services ----
services:
  # ============================================
  # INFRASTRUCTURE
  # ============================================
  mongo:
    image: mongo:7
    container_name: rtmn-mongo
    restart: unless-stopped
    networks: [rtmn-network]
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USER:-rtmn_dev}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD:-dev_password}
      MONGO_INITDB_DATABASE: ${MONGODB_DATABASE:-rtmn_dev}
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7
    container_name: rtmn-redis
    restart: unless-stopped
    networks: [rtmn-network]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ============================================
  # MONITORING STACK
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: rtmn-prometheus
    restart: unless-stopped
    networks: [rtmn-network]
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/alerts:/etc/prometheus/alerts
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'

  grafana:
    image: grafana/grafana:latest
    container_name: rtmn-grafana
    restart: unless-stopped
    networks: [rtmn-network]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

  node-exporter:
    image: prom/node-exporter:latest
    container_name: rtmn-node-exporter
    restart: unless-stopped
    networks: [rtmn-network]
    ports:
      - "9100:9100"

  mongodb-exporter:
    image: percona/mongodb_exporter:latest
    container_name: rtmn-mongodb-exporter
    restart: unless-stopped
    networks: [rtmn-network]
    ports:
      - "9216:9216"
    environment:
      MONGODB_URI: mongodb://${MONGODB_USER:-rtmn_dev}:${MONGODB_PASSWORD:-dev_password}@mongo:27017
    depends_on:
      - mongo

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: rtmn-redis-exporter
    restart: unless-stopped
    networks: [rtmn-network]
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      - redis

  # ============================================
  # RABTUL TECHNOLOGIES - Core Infrastructure
