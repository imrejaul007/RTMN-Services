name: Deploy Production

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'staging'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push BrandPulse API
        uses: docker/build-push-action@v5
        with:
          context: ./products/brandpulse
          push: true
          tags: |
            ghcr.io/rtmn-group/brandpulse:staging
            ghcr.io/rtmn-group/brandpulse:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push BrandPulse Dashboard
        uses: docker/build-push-action@v5
        with:
          context: ./products/brandpulse-dashboard
          push: true
          tags: |
            ghcr.io/rtmn-group/brandpulse-dashboard:staging
            ghcr.io/rtmn-group/brandpulse-dashboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to staging
        run: |
          echo "Deploying to staging..."
          kubectl config use-context staging
          kubectl set image deployment/brandpulse-api \
            brandpulse-api=ghcr.io/rtmn-group/brandpulse:${{ github.sha }} \
            --namespace=rtmn-staging
          kubectl set image deployment/brandpulse-dashboard \
            brandpulse-dashboard=ghcr.io/rtmn-group/brandpulse-dashboard:${{ github.sha }} \
            --namespace=rtmn-staging
          kubectl rollout status deployment/brandpulse-api -n rtmn-staging --timeout=300s
          kubectl rollout status deployment/brandpulse-dashboard -n rtmn-staging --timeout=300s
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG_STAGING }}

  deploy-production:
    runs-on: ubuntu-latest
    environment: production
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.environment == 'production'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build and push BrandPulse API
        uses: docker/build-push-action@v5
        with:
          context: ./products/brandpulse
          push: true
          tags: |
            ghcr.io/rtmn-group/brandpulse:${{ env.VERSION }}
            ghcr.io/rtmn-group/brandpulse:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push BrandPulse Dashboard
        uses: docker/build-push-action@v5
        with:
          context: ./products/brandpulse-dashboard
          push: true
          tags: |
            ghcr.io/rtmn-group/brandpulse-dashboard:${{ env.VERSION }}
            ghcr.io/rtmn-group/brandpulse-dashboard:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to production
        run: |
          echo "Deploying to production..."
          kubectl config use-context production
          kubectl set image deployment/brandpulse-api \
            brandpulse-api=ghcr.io/rtmn-group/brandpulse:${{ env.VERSION }} \
            --namespace=rtmn
          kubectl set image deployment/brandpulse-dashboard \
            brandpulse-dashboard=ghcr.io/rtmn-group/brandpulse-dashboard:${{ env.VERSION }} \
            --namespace=rtmn
          kubectl rollout status deployment/brandpulse-api -n rtmn --timeout=600s
          kubectl rollout status deployment/brandpulse-dashboard -n rtmn --timeout=600s
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG_PRODUCTION }}

      - name: Notify deployment
        run: |
          echo "Deployment complete: v${{ env.VERSION }}"
          curl -X POST ${{ secrets.SLACK_WEBHOOK }} \
            -H 'Content-type: application/json' \
            --data '{"text":"RTMN v${{ env.VERSION }} deployed to production"}'
