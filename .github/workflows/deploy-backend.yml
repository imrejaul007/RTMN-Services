name: Deploy Backend to Render

on:
  push:
    branches:
      - main
    paths:
      - 'services/pilot-onboarding/**'
      - 'render.yaml'
      - '.github/workflows/deploy-backend.yml'

env:
  RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}

jobs:
  deploy-backend:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/pilot-onboarding/package-lock.json

      - name: Download Render CLI
        run: |
          curl -fsSL https://github.com/render/render-cli/releases/download/v2.20.0/cli_v2.20.0_darwin_arm64.zip -o render.zip
          unzip -o render.zip
          chmod +x ./render
          mv ./render /usr/local/bin/render
        shell: bash

      - name: Configure Render credentials
        run: render config --token="$RENDER_API_KEY"
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}

      - name: Check Render Blueprint
        run: render blueprints validate --spec render.yaml
        working-directory: /Users/rejaulkarim/Documents/RTMN

      - name: Apply Render Blueprint
        run: render blueprints apply --spec render.yaml --yes
        working-directory: /Users/rejaulkarim/Documents/RTMN
        continue-on-error: true

      - name: Sync and deploy pilot-onboarding service
        run: |
          if render services list --format json 2>/dev/null | jq -e '.[] | select(.name == "pilot-onboarding")' > /dev/null; then
            echo "pilot-onboarding service exists, syncing..."
            render services sync pilot-onboarding --wait --timeout 120
          else
            echo "Creating pilot-onboarding service..."
            render blueprints apply --spec render.yaml --yes
          fi
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        continue-on-error: true

      - name: Report Deploy Status
        if: always()
        run: |
          echo "=== Render Deploy Status ==="
          echo "Blueprint: render.yaml"
          echo "Workspace: tea-d705u1ea2pns73av4frg"
          echo ""
          echo "Note: If billing is suspended, deploy will fail."
          echo "Fix: Add payment method at dashboard.render.com/billing"
          echo ""
          echo "After billing is active, you can manually apply:"
          echo "  render blueprints apply --spec render.yaml"
