# RTMN Phase A+B+C+D development stack — Phase E deliverable
# ----------------------------------------------------------------------------
# Spin up the *actually-shipped* services: the Hub, the SUTAR services that
# back the multi-option ranking + trust federation, and one Nexha upstream.
# Everything else (24 industry OS, ACN, TwinOS) stays in start-twins.sh /
# start-sutar.sh because their Dockerfiles haven't been port-verified yet.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up --build
#   bash demos/full-stack-demo.sh   # in another shell
#
# Why this compose file exists:
#   - docker-compose.yml in this repo was written before the port audit of
#     2026-06-20; many EXPOSE values are wrong (e.g. decision-engine was 4240,
#     trust-engine was 4180 — both are actually 4290 and 4291 today).
#   - This file pins to ports the demo script (demos/full-stack-demo.sh)
#     actually expects, so `compose up` + `bash demos/full-stack-demo.sh`
#     just works.
# ----------------------------------------------------------------------------

version: '3.8'

# ---------------------------------------------------------------------------
# Redis (ADR-0009 Phase 2: Event Bus backend)
# Required by all SUTAR services for state-change event publishing via
# @rtmn/shared/event-bus. Local dev uses redis:7-alpine, no auth, AOF off.
# In docker, REDIS_URL is redis://redis:6379 for services on this network.
# ---------------------------------------------------------------------------
services:
  redis:
    image: redis:7-alpine
    container_name: rtmn-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 6
    restart: unless-stopped
    networks:
      - rtmn-dev

  # ---------------------------------------------------------------------------
  # RTMN Unified Hub — the single front door for 50+ services
  # (companies/RABTUL-Technologies/REZ-ecosystem-connector)
  # ---------------------------------------------------------------------------
  hub:
    build:
      context: ./companies/RABTUL-Technologies/REZ-ecosystem-connector
      dockerfile: Dockerfile
    container_name: rtmn-hub
    ports:
      - "4399:4399"
    environment:
      - NODE_ENV=production
      - PORT=4399
      - SUTAR_DECISION_URL=http://decision-engine:4290
      - SUTAR_TRUST_ENGINE_URL=http://trust-engine:4291
      - SUTAR_ECONOMY_URL=http://economy-os:4294
      - POLICY_OS_URL=http://policy-os:4254
      - SKILL_OS_URL=http://skill-os:4743
      - NEXHA_SUPPLIER_NETWORK_URL=http://nexha-supplier-network:4280
      - NEXHA_DISTRIBUTION_NETWORK_URL=http://nexha-distribution-network:4285
      - NEXHA_WAREHOUSE_NETWORK_URL=http://nexha-warehouse-network:4288
      - NEXHA_TRADE_FINANCE_URL=http://nexha-trade-finance-network:4287
      - NEXHA_PRICING_NETWORK_URL=http://nexha-pricing-network:4286
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
      - decision-engine
      - trust-engine
      - economy-os
      - policy-os
      - skill-os
      - nexha-supplier-network
      - nexha-distribution-network
      - nexha-warehouse-network
      - nexha-trade-finance-network
      - nexha-pricing-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4399/health"]
      interval: 15s
      timeout: 5s
      retries: 6
    restart: unless-stopped
    networks:
      - rtmn-dev

  # ---------------------------------------------------------------------------
  # SUTAR OS — autonomous economic layer (companies/HOJAI-AI/sutar-os)
  # Only the three services the demo exercises are wired here. Add more
  # following the same pattern as Phase E work continues.
  # ---------------------------------------------------------------------------
  decision-engine:
    build:
      context: ./companies/HOJAI-AI/sutar-os/core/sutar-decision-engine
      dockerfile: Dockerfile
    container_name: rtmn-decision-engine
    ports:
      - "4290:4290"
    environment:
      - NODE_ENV=production
      - PORT=4290
      - DB_PATH=/data/decision.sqlite
      - REDIS_URL=redis://redis:6379
    volumes:
      - decision-data:/data
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4290/health"]
      interval: 15s
      timeout: 5s
      retries: 6
    restart: unless-stopped
    networks:
      - rtmn-dev

  trust-engine:
    build:
      context: ./companies/HOJAI-AI/sutar-os/core/sutar-trust-engine
      dockerfile: Dockerfile
    container_name: rtmn-trust-engine
    ports:
      - "4291:4291"
    environment:
      - NODE_ENV=production
      - PORT=4291
      - SADA_URL=http://sada-os:4190
      - REDIS_URL=redis://redis:6379
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4291/health"]
      interval: 15s
      timeout: 5s
      retries: 6
    depends_on:
      - redis
      - sada-os
    restart: unless-stopped
    networks:
      - rtmn-dev

  economy-os:
    build:
      context: ./companies/HOJAI-AI/sutar-os/economy/sutar-economy-os
      dockerfile: Dockerfile
    container_name: rtmn-economy-os
    ports:
      - "4251:4251"
    environment:
      - NODE_ENV=production
      - PORT=4251
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4251/health"]
      interval: 15s
      timeout: 5s
      retries: 6
    restart: unless-stopped
    networks:
      - rtmn-dev

  # ---------------------------------------------------------------------------
  # SADA OS — Trust Governance (companies/HOJAI-AI/platform/trust/sada-os)
  # Required by trust-engine's /api/v1/sada/status probe.
  # ---------------------------------------------------------------------------
  sada-os:
    build:
      context: ./companies/HOJAI-AI/platform/trust/sada-os
      dockerfile: Dockerfile
    container_name: rtmn-sada-os
    ports:
      - "4190:4190"
    environment:
      - NODE_ENV=production
      - PORT=4190
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4190/health"]
      interval: 15s
      timeout: 5s
      retries: 6
    restart: unless-stopped
    networks:
      - rtmn-dev

  # ---------------------------------------------------------------------------
  # Nexha Commerce Network — Phase C services (2026-06-22, ADR-0009 Phase 0).
  # These 5 services replaced the 3 L1 stubs (procurement-os, distribution-os,
  # trade-finance) which were deleted. Each has its own Dockerfile.
  # ---------------------------------------------------------------------------
  nexha-supplier-network:
    build:
      context: ./companies/Nexha/services/nexha-supplier-network
      dockerfile: Dockerfile
    container_name: rtmn-nexha-supplier-network
    ports:
      - "4280:4280"
    environment:
      - NODE_ENV=production
      - PORT=4280
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4280/health"]
      interval: 15s
      timeout: 5s
      retries: 6
    restart: unless-stopped
    networks:
      - rtmn-dev

  nexha-distribution-network:
    build:
      context: ./companies/Nexha/services/nexha-distribution-network
      dockerfile: Dockerfile
    container_name: rtmn-nexha-distribution-network
    ports:
      - "4285:4285"
    environment:
      - NODE_ENV=production
      - PORT=4285
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4285/health"]
      interval: 15s
      timeout: 5s
      retries: 6
    restart: unless-stopped
    networks:
      - rtmn-dev

  nexha-warehouse-network:
    build:
      context: ./companies/Nexha/services/nexha-warehouse-network
      dockerfile: Dockerfile
    container_name: rtmn-nexha-warehouse-network
    ports:
      - "4288:4288"
    environment:
      - NODE_ENV=production
      - PORT=4288
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4288/health"]
      interval: 15s
      timeout: 5s
      retries: 6
    restart: unless-stopped
    networks:
      - rtmn-dev

  nexha-trade-finance-network:
    build:
      context: ./companies/Nexha/services/nexha-trade-finance-network
      dockerfile: Dockerfile
    container_name: rtmn-nexha-trade-finance-network
    ports:
      - "4287:4287"
    environment:
      - NODE_ENV=production
      - PORT=4287
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4287/health"]
      interval: 15s
      timeout: 5s
      retries: 6
    restart: unless-stopped
    networks:
      - rtmn-dev

  nexha-pricing-network:
    build:
      context: ./companies/Nexha/services/nexha-pricing-network
      dockerfile: Dockerfile
    container_name: rtmn-nexha-pricing-network
    ports:
      - "4286:4286"
    environment:
      - NODE_ENV=production
      - PORT=4286
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4286/health"]
      interval: 15s
      timeout: 5s
      retries: 6
    restart: unless-stopped
    networks:
      - rtmn-dev

  # ---------------------------------------------------------------------------
  # HOJAI AI — Foundation (Phase F.1, 2026-06-22)
  # PolicyOS + SkillOS are now production-ready and reachable via the Hub
  # at /api/foundation/<service>/<path>.
  # ---------------------------------------------------------------------------
  policy-os:
    build:
      context: ./companies/HOJAI-AI/platform/flow/policy-os
      dockerfile: Dockerfile
    container_name: rtmn-policy-os
    ports:
      - "4254:4254"
    environment:
      - NODE_ENV=production
      - PORT=4254
      - DATA_DIR=/data
      - REDIS_URL=redis://redis:6379
    volumes:
      - policy-os-data:/data
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4254/health"]
      interval: 15s
      timeout: 5s
      retries: 6
    restart: unless-stopped
    networks:
      - rtmn-dev

  skill-os:
    build:
      context: ./companies/HOJAI-AI/platform/skills/skill-os
      dockerfile: Dockerfile
    container_name: rtmn-skill-os
    ports:
      - "4743:4743"
    environment:
      - NODE_ENV=production
      - PORT=4743
      - REDIS_URL=redis://redis:6379
    volumes:
      - skill-os-data:/data
    depends_on:
      - redis
    healthcheck:
