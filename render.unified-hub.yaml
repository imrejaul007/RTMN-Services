# RTMN Unified Hub - Render Blueprint
# Deploy entire ecosystem to Render

services:
  # Unified Hub
  - type: web
    name: rtmn-unified-hub
    env: node
    region: singapore
    plan: starter
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4399

