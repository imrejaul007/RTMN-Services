# Nexha OS Runtime — Enterprise Tier Override
# Enterprise = All services including monitoring stack
# Run: docker compose -f docker-compose.yml -f docker-compose.enterprise.yml up -d

version: '3.9'

services:
  # Enterprise overrides — enable all services
  capability-os:
    profiles: [enterprise]
  acp-messaging:
    profiles: [enterprise]
  agent-marketplace:
    profiles: [enterprise]
  mission-planner:
    profiles: [enterprise]
  prometheus:
    profiles: [enterprise]
  grafana:
    profiles: [enterprise]
