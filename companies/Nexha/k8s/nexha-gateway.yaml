---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexha-gateway
  namespace: nexha
  labels:
    app: nexha-gateway
    tier: gateway
    product: nexha
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexha-gateway
  template:
    metadata:
      labels:
        app: nexha-gateway
        tier: gateway
        product: nexha
    spec:
      containers:
      - name: gateway
        image: nexha/gateway:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5002
          name: http
        envFrom:
        - configMapRef:
            name: nexha-config
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "5002"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5002
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5002
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: nexha-gateway
  namespace: nexha
spec:
  selector:
    app: nexha-gateway
  ports:
  - port: 5002
    targetPort: 5002
    name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nexha-gateway-hpa
  namespace: nexha
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nexha-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
