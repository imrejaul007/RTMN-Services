# ===========================================
# NeXha Kubernetes Secrets Template
# ===========================================
# IMPORTANT: Copy this file to secrets.yaml and fill in actual values
# DO NOT commit secrets.yaml to version control
# ===========================================

apiVersion: v1
kind: Secret
metadata:
  name: nexha-secrets
  namespace: nexha
type: Opaque
stringData:
  # MongoDB Connection
  # Replace with your MongoDB Atlas connection string for production
  MONGODB_URI: "mongodb+srv://username:password@cluster.mongodb.net/nexha"

  # Redis Connection
  REDIS_URL: "redis://:password@redis-host:6379"

  # Authentication
  AUTH_SERVICE_URL: "https://rez-auth-service.onrender.com"
  INTERNAL_SERVICE_TOKEN: "CHANGE_ME_generate-secure-token-here"

  # Webhook Security
  WEBHOOK_SECRET: "CHANGE_ME_generate-secure-webhook-secret"

  # Payment Integration (if applicable)
  RAZORPAY_KEY_ID: ""
  RAZORPAY_KEY_SECRET: ""

  # Observability
  SENTRY_DSN: ""
  SENTRY_TRACES_SAMPLE_RATE: "0.1"