---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexha-portal
  namespace: nexha
  labels:
    app: nexha-portal
    tier: frontend
    product: nexha
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexha-portal
  template:
    metadata:
      labels:
        app: nexha-portal
        tier: frontend
        product: nexha
    spec:
      containers:
      - name: portal
        image: nexha/portal:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: NEXT_PUBLIC_API_URL
          value: "https://api.nexha.rez.money"
        - name: NEXT_PUBLIC_APP_URL
          value: "https://nexha.rez.money"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: nexha-portal
  namespace: nexha
  labels:
    app: nexha-portal
    product: nexha
spec:
  selector:
    app: nexha-portal
  ports:
  - port: 80
    targetPort: 3000
    name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nexha-portal-hpa
  namespace: nexha
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nexha-portal
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
