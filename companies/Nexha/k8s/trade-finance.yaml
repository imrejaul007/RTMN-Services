---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexha-trade-finance
  namespace: nexha
  labels:
    app: nexha-trade-finance
    tier: backend
    product: nexha
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexha-trade-finance
  template:
    metadata:
      labels:
        app: nexha-trade-finance
        tier: backend
        product: nexha
    spec:
      containers:
      - name: trade-finance
        image: nexha/trade-finance:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 4000
          name: http
        envFrom:
        - configMapRef:
            name: nexha-config
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "4000"
        - name: SERVICE_NAME
          value: "nexha-trade-finance"
        - name: MONGODB_URI
          valueFrom:
            secretKeyRef:
              name: nexha-secrets
              key: MONGODB_URI
              optional: true
        - name: AUTH_SERVICE_URL
          valueFrom:
            secretKeyRef:
              name: nexha-secrets
              key: AUTH_SERVICE_URL
        - name: INTERNAL_SERVICE_TOKEN
          valueFrom:
            secretKeyRef:
              name: nexha-secrets
              key: INTERNAL_SERVICE_TOKEN
        - name: WEBHOOK_SECRET
          valueFrom:
            secretKeyRef:
              name: nexha-secrets
              key: WEBHOOK_SECRET
        - name: RAZORPAY_KEY_ID
          valueFrom:
            secretKeyRef:
              name: nexha-secrets
              key: RAZORPAY_KEY_ID
              optional: true
        - name: RAZORPAY_KEY_SECRET
          valueFrom:
            secretKeyRef:
              name: nexha-secrets
              key: RAZORPAY_KEY_SECRET
              optional: true
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 4000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 4000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health
            port: 4000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 12
---
apiVersion: v1
kind: Service
metadata:
  name: nexha-trade-finance
  namespace: nexha
  labels:
    app: nexha-trade-finance
    product: nexha
spec:
  selector:
    app: nexha-trade-finance
  ports:
  - port: 80
    targetPort: 4000
    name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nexha-trade-finance-hpa
  namespace: nexha
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nexha-trade-finance
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
