version: '3.9'

services:
  federation-os:
    build: .
    container_name: nexha-federation-os
    restart: unless-stopped
    ports:
      - "4273:4273"
    environment:
      NODE_ENV: production
      PORT: 4273
      FEDERATION_OS_REQUIRE_AUTH: ${FEDERATION_OS_REQUIRE_AUTH:-true}
      JWT_SECRET: ${JWT_SECRET:-changeme}
      LOG_LEVEL: info
    volumes:
      - federation-data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4273/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

volumes:
  federation-data:
