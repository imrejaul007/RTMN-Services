# Render Blueprint - RABTUL SLA Monitor
services:
  - type: web
    name: rtmn-sla-monitor
    env: node
    region: singapore
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4195
      - key: BREACH_DETECTOR_URL
        value: http://localhost:4196
      - key: NOTIFICATION_SERVICE_URL
        value: http://localhost:4011
      - key: EVENT_BUS_URL
        value: http://localhost:4510
