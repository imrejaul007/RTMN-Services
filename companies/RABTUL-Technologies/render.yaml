# Render Blueprint - REZ-App Backend Services
# Deploy all 8 services at once: https://render.com/deploy?repo=https://github.com/imrejaul007/RTMN-Services
#
# To use:
# 1. Push this file to your repo (already done)
# 2. Go to https://dashboard.render.com/blueprints
# 3. Click "New Blueprint Instance" → Connect to your repo
# 4. Render will detect this file and create all 8 services
#
# IMPORTANT: After first deploy, you must set the SECRET env vars manually
# in the Render dashboard (JWT_SECRET, MONGO_URI, etc.) - render.yaml uses
# sync: false for these so they can be set without committing to git.

services:
  # ===========================================================================
  # 1. rez-auth-service (Port 4002)
  # ===========================================================================
  - type: web
    name: rez-auth-service
    rootDir: companies/RABTUL-Technologies/rez-auth-service
    runtime: node
    plan: starter
    region: oregon
    branch: main
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4002"
      - key: SERVICE_NAME
        value: rez-auth-service
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_ADMIN_SECRET
        sync: false
      - key: JWT_MERCHANT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_MFA_SESSION_SECRET
        sync: false
      - key: OTP_HMAC_SECRET
        sync: false
      - key: OTP_TOTP_ENCRYPTION_KEY
        sync: false
      - key: INTERNAL_SERVICE_TOKENS_JSON
        sync: false
      - key: CORS_ORIGIN
        value: "*"
      - key: SENTRY_DSN
        sync: false

