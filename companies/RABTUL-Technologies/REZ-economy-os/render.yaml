# Render Blueprint - REZ Economy OS
services:
  - type: web
    name: rtmn-economy-os
    env: node
    region: singapore
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4251
      - key: EVENT_BUS_URL
        value: http://localhost:4510
      - key: TRUST_SCORER_URL
        value: http://localhost:4180
      - key: RABTUL_WALLET_URL
        value: http://localhost:4004
