version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-5170}:5170"
    environment:
      - NODE_ENV=production
      - PORT=5170
      # Internal Service Auth
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN}
      # HOJAI AI Services
      - HOJAI_WEB_INTEL=${HOJAI_WEB_INTEL:-http://hojai-web-intel:4595}
      - HOJAI_MERCHANT_INTEL=${HOJAI_MERCHANT_INTEL:-http://hojai-merchant-intel:4751}
      - HOJAI_LEAD_SERVICE=${HOJAI_LEAD_SERVICE:-http://hojai-lead-service:4752}
      - HOJAI_KG=${HOJAI_KG:-http://hojai-knowledge-graph:4786}
      - HOJAI_TWIN_OS=${HOJAI_TWIN_OS:-http://hojai-twin-os:4521}
      # Genie Voice
      - GENIE_VOICE=${GENIE_VOICE:-http://genie-voice:4760}
      # REZ Services
      - REZ_IDENTITY_HUB=${REZ_IDENTITY_HUB:-http://rez-identity:4702}
      - REZ_CRM_HUB=${REZ_CRM_HUB:-http://rez-crm-hub:4056}
      - REZ_MERCHANT=${REZ_MERCHANT:-http://rez-merchant:4100}
      - REZ_CONSUMER=${REZ_CONSUMER:-http://rez-consumer:4200}
      # AssetMind
      - ASSETMIND=${ASSETMIND:-http://assetmind:5200}
      # AdBazaar
      - ADBAZAAR_CAMPAIGNS=${ADBAZAAR_CAMPAIGNS:-http://adbazaar:4300}
      - ADBAZAAR_CRM=${ADBAZAAR_CRM:-http://adbazaar-crm:4303}
      # Integration Tokens
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - LINKEDIN_ACCESS_TOKEN=${LINKEDIN_ACCESS_TOKEN}
      - GMAIL_CLIENT_ID=${GMAIL_CLIENT_ID}
      - GMAIL_CLIENT_SECRET=${GMAIL_CLIENT_SECRET}
      - GMAIL_REFRESH_TOKEN=${GMAIL_REFRESH_TOKEN}
      - ZOOM_ACCOUNT_ID=${ZOOM_ACCOUNT_ID}
      - ZOOM_CLIENT_ID=${ZOOM_CLIENT_ID}
      - ZOOM_CLIENT_SECRET=${ZOOM_CLIENT_SECRET}
    networks:
      - rtnm
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5170/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # Note: MongoDB and Redis removed - this service connects to external RTNM services
    # If local persistence is needed, add mongodb and redis services

networks:
  rtnm:
    driver: bridge
