          cache-from: type=gha
          cache-to: type=gha,mode=max
        env:
          DOCKER_BUILDKIT: 1

  # Summary job
  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs:
      - graphql-federation
      - automl-pipeline
      - invoice-ocr
      - contract-management
      - legal-document-ai
      - cosmic-twin
      - ranking-service
    if: always()

    steps:
      - name: Generate deployment report
        run: |
          echo "# Deployment Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Environment: ${{ env.ENVIRONMENT }}" >> $GITHUB_STEP_SUMMARY
          echo "Triggered by: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "Run ID: ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Service Status" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| GraphQL Federation | ${{ needs.graphql-federation.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| AutoML Pipeline | ${{ needs.automl-pipeline.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Invoice OCR | ${{ needs.invoice-ocr.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Contract Management | ${{ needs.contract-management.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Legal Document AI | ${{ needs.legal-document-ai.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cosmic Twin | ${{ needs.cosmic-twin.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Ranking Service | ${{ needs.ranking-service.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All services deployed successfully!" >> $GITHUB_STEP_SUMMARY
