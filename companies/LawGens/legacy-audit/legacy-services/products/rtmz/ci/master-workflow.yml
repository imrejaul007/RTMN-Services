            ghcr.io/imrejaul007/rez-legal-document-ai:latest
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
        env:
          DOCKER_BUILDKIT: 1

  # Cosmic Twin
  cosmic-twin:
    name: Cosmic Twin
    runs-on: ubuntu-latest
    if: github.event.inputs.services == 'all' || github.event.inputs.services == 'cosmic-twin'
    environment: ${{ env.ENVIRONMENT }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
