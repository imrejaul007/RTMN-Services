          cache-from: type=gha
          cache-to: type=gha,mode=max
        env:
          DOCKER_BUILDKIT: 1

  # Ranking Service
  ranking-service:
    name: Ranking Service
    runs-on: ubuntu-latest
    if: github.event.inputs.services == 'all' || github.event.inputs.services == 'ranking-service'
