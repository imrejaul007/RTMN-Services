---
# Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rtmz-ingress
  namespace: rtmz
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - api.rtmz.com
      secretName: rtmz-tls
  rules:
    - host: api.rtmz.com
      http:
        paths:
          - path: /graphql
            pathType: Prefix
            backend:
              service:
                name: graphql-federation
                port:
                  number: 5000
          - path: /automl
            pathType: Prefix
            backend:
              service:
                name: automl-pipeline
                port:
                  number: 5001
          - path: /invoice
            pathType: Prefix
            backend:
              service:
                name: invoice-ocr
                port:
                  number: 5002
          - path: /contracts
            pathType: Prefix
            backend:
              service:
                name: contract-management
                port:
                  number: 5003
          - path: /legal
            pathType: Prefix
            backend:
              service:
                name: legal-document-ai
                port:
                  number: 5004
          - path: /twin
            pathType: Prefix
            backend:
              service:
                name: cosmic-twin
                port:
                  number: 5005
          - path: /rank
            pathType: Prefix
            backend:
              service:
                name: ranking-service
                port:
                  number: 5006
