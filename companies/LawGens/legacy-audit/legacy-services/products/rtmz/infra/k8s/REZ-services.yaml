---
# Service - GraphQL Gateway
apiVersion: v1
kind: Service
metadata:
  name: graphql-federation
  namespace: rtmz
spec:
  ports:
    - port: 5000
      targetPort: 5000
  selector:
    app: graphql-federation

---
# Service - AutoML
apiVersion: v1
kind: Service
metadata:
