# RTMN Kubernetes Deployment
# All 7 new services + infrastructure

apiVersion: v1
kind: Namespace
metadata:
  name: rtmz
  labels:
    app.kubernetes.io/name: rtmz
    app.kubernetes.io/managed-by: kubectl

---
# ConfigMap for common environment variables
apiVersion: v1
kind: ConfigMap
metadata:
  name: rtmz-config
  namespace: rtmz
data:
  NODE_ENV: "production"
  MONGODB_URI: "mongodb://mongodb:27017"
  REDIS_URL: "redis://redis:6379"

---
# MongoDB
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: rtmz
spec:
  serviceName: mongodb
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7.0
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
  volumeClaimTemplates:
    - metadata:
        name: mongodb-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources:
          requests:
            storage: 10Gi

---
# Redis
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: rtmz
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
# GraphQL Federation Gateway (5000)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: graphql-federation
  namespace: rtmz
spec:
  replicas: 2
  selector:
    matchLabels:
      app: graphql-federation
  template:
    metadata:
      labels:
        app: graphql-federation
    spec:
      containers:
        - name: graphql-federation
          image: ghcr.io/imrejaul007/rez-graphql-federation:latest
          ports:
            - containerPort: 5000
          env:
            - name: PORT
              value: "5000"
            - name: MONGODB_URI
              valueFrom:
                configMapKeyRef:
                  name: rtmz-config
                  key: MONGODB_URI
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5

---
