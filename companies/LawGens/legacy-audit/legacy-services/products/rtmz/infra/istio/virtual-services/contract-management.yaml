apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: contract-management-virtualservice
  namespace: rtmz
  labels:
    app: contract-management
spec:
  hosts:
    - contract-management.rtmz.svc.cluster.local
    - contract-management
  http:
    # Contract search and retrieval
    - name: search
      match:
        - uri:
            prefix: "/search"
        - uri:
            prefix: "/contracts"
      route:
        - destination:
            host: contract-management.rtmz.svc.cluster.local
            port:
              number: 8080
          weight: 100
      retries:
        attempts: 3
        perTryTimeout: 5s
        retryOn: gateway-error,connect-failure,refused-stream
      timeout: 30s

    # Contract creation
    - name: create
      match:
        - uri:
            prefix: "/create"
        - uri:
            prefix: "/contracts/create"
      route:
        - destination:
            host: contract-management.rtmz.svc.cluster.local
            port:
              number: 8080
          weight: 100
      retries:
        attempts: 2
        perTryTimeout: 10s
        retryOn: gateway-error
      timeout: 60s

    # Contract review and approval workflow
    - name: review
      match:
        - uri:
            prefix: "/review"
        - uri:
            prefix: "/approve"
      route:
        - destination:
            host: contract-management.rtmz.svc.cluster.local
            port:
              number: 8080
          weight: 100
      retries:
        attempts: 3
        perTryTimeout: 8s
        retryOn: gateway-error,connect-failure
      timeout: 120s

    # Clause analysis with AutoML
    - name: analyze
      match:
        - uri:
            prefix: "/analyze"
        - uri:
            prefix: "/clause"
      route:
        - destination:
            host: contract-management.rtmz.svc.cluster.local
            port:
              number: 8080
          weight: 100
      retries:
        attempts: 3
        perTryTimeout: 15s
        retryOn: gateway-error,connect-failure
      timeout: 180s

    # Version management
    - name: versions
      match:
        - uri:
            prefix: "/versions"
        - uri:
            prefix: "/history"
      route:
        - destination:
            host: contract-management.rtmz.svc.cluster.local
            port:
              number: 8080
          weight: 100
      retries:
        attempts: 3
        perTryTimeout: 3s
        retryOn: gateway-error
      timeout: 30s

    # Signature and execution
    - name: sign
      match:
        - uri:
            prefix: "/sign"
        - uri:
            prefix: "/execute"
      route:
        - destination:
            host: contract-management.rtmz.svc.cluster.local
            port:
              number: 8080
          weight: 100
      retries:
        attempts: 2
        perTryTimeout: 20s
        retryOn: gateway-error
      timeout: 300s

    # Health and metrics
    - name: health
      match:
        - uri:
            prefix: "/health"
      route:
        - destination:
            host: contract-management.rtmz.svc.cluster.local
            port:
              number: 8080

    - name: metrics
      match:
        - uri:
            prefix: "/metrics"
      route:
        - destination:
            host: contract-management.rtmz.svc.cluster.local
            port:
              number: 9090

    # Traffic mirroring for new feature validation
    - name: mirrored-search
      match:
        - uri:
            prefix: "/search/new"
      route:
        - destination:
            host: contract-management.rtmz.svc.cluster.local
            port:
              number: 8080
            subset: stable
          weight: 95
        - destination:
            host: contract-management.rtmz.svc.cluster.local
            port:
              number: 8080
            subset: canary
          weight: 5

  exportTo:
    - "istio-system"
