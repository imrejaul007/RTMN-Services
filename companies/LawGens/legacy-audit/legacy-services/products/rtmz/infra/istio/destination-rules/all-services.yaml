# DestinationRule for Contract Management Service
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: contract-management-destination
  namespace: rtmz
  labels:
    app: contract-management
spec:
  host: contract-management.rtmz.svc.cluster.local
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
        connectTimeout: 20s
      http:
        h2UpgradePolicy: UPGRADE
        http1MaxPendingRequests: 100
        http2MaxRequests: 500
        maxRequestsPerConnection: 100
        maxRetries: 3
        idleTimeout: 180s
    loadBalancer:
      simple: LEAST_CONN
      localityLbSetting:
        enabled: true
        distribute:
          - from: region/*
            to:
              "region/zone-1/*": 80
              "region/zone-2/*": 20
    circuitBreaker:
      consecutive5xxErrors: 5
      interval: 10s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
      minHealthPercent: 30
    tls:
      mode: ISTIO_MUTUAL
