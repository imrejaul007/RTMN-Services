# DestinationRule for GraphQL Federation Service
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: graphql-federation-destination
  namespace: rtmz
  labels:
    app: graphql-federation
spec:
  host: graphql-federation.rtmz.svc.cluster.local
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
        connectTimeout: 10s
      http:
        h2UpgradePolicy: UPGRADE
        http1MaxPendingRequests: 100
        http2MaxRequests: 1000
        maxRequestsPerConnection: 100
        maxRetries: 3
        idleTimeout: 60s
    loadBalancer:
      simple: LEAST_CONN
      consistentHash:
        minimalLatency: true
        useSourceIp: false
    circuitBreaker:
      consecutive5xxErrors: 5
      interval: 10s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
      minHealthPercent: 30
    tls:
      mode: ISTIO_MUTUAL
      clientCertificate: /etc/istio/certs-cert/tls.crt
      privateKey: /etc/istio/certs-cert/tls.key
      caCertificates: /etc/istio/certs-cert/ca.crt
    portLevelSettings:
      - port:
          number: 8080
        connectionPool:
          tcp:
            maxConnections: 200
          http:
            h2UpgradePolicy: UPGRADE
            http1MaxPendingRequests: 200
            maxRetries: 5
        loadBalancer:
          simple: ROUND_ROBIN
---
