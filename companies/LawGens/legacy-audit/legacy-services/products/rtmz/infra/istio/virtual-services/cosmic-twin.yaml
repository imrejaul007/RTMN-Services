apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: cosmic-twin-virtualservice
  namespace: rtmz
  labels:
    app: cosmic-twin
spec:
  hosts:
    - cosmic-twin.rtmz.svc.cluster.local
    - cosmic-twin
  http:
    # Twin synchronization
    - name: sync
      match:
        - uri:
            prefix: "/sync"
        - uri:
            prefix: "/twin"
      route:
        - destination:
            host: cosmic-twin.rtmz.svc.cluster.local
            port:
              number: 8080
          weight: 100
      retries:
        attempts: 3
        perTryTimeout: 5s
        retryOn: gateway-error,connect-failure,reset
      timeout: 30s

    # Real-time updates (WebSocket)
    - name: realtime
      match:
        - uri:
            prefix: "/realtime"
        - uri:
            prefix: "/ws/twin"
        - scheme:
            regex: "ws|wss"
      route:
        - destination:
            host: cosmic-twin.rtmz.svc.cluster.local
            port:
              number: 8080
          weight: 100
      timeout: 3600s

    # Digital twin queries
    - name: query
      match:
        - uri:
            prefix: "/query"
        - uri:
            prefix: "/state"
      route:
        - destination:
            host: cosmic-twin.rtmz.svc.cluster.local
            port:
              number: 8080
          weight: 100
      retries:
        attempts: 3
        perTryTimeout: 3s
        retryOn: gateway-error,connect-failure
      timeout: 15s

    # Simulation endpoints
    - name: simulate
      match:
        - uri:
            prefix: "/simulate"
        - uri:
            prefix: "/what-if"
      route:
        - destination:
            host: cosmic-twin.rtmz.svc.cluster.local
            port:
              number: 8080
          weight: 100
      retries:
        attempts: 2
        perTryTimeout: 30s
        retryOn: gateway-error
      timeout: 600s

    # Analytics and reporting
    - name: analytics
      match:
        - uri:
            prefix: "/analytics"
        - uri:
            prefix: "/report"
      route:
        - destination:
            host: cosmic-twin.rtmz.svc.cluster.local
            port:
              number: 8080
          weight: 100
      retries:
        attempts: 3
        perTryTimeout: 10s
        retryOn: gateway-error,connect-failure
      timeout: 120s

    # Prediction endpoints
    - name: predict
      match:
        - uri:
            prefix: "/predict"
      route:
        - destination:
            host: cosmic-twin.rtmz.svc.cluster.local
            port:
              number: 8080
          weight: 100
      retries:
        attempts: 3
        perTryTimeout: 8s
        retryOn: gateway-error,connect-failure
      timeout: 60s

    # Health and metrics
    - name: health
      match:
        - uri:
            prefix: "/health"
      route:
        - destination:
            host: cosmic-twin.rtmz.svc.cluster.local
            port:
              number: 8080

    - name: metrics
      match:
        - uri:
            prefix: "/metrics"
      route:
        - destination:
            host: cosmic-twin.rtmz.svc.cluster.local
            port:
              number: 9090

    # Traffic mirroring for performance testing
    - name: mirrored-sync
      match:
        - uri:
            prefix: "/sync/v2"
      route:
        - destination:
            host: cosmic-twin.rtmz.svc.cluster.local
            port:
              number: 8080
            subset: stable
          weight: 95
        - destination:
            host: cosmic-twin.rtmz.svc.cluster.local
            port:
              number: 8080
            subset: canary
          weight: 5

  exportTo:
    - "istio-system"
