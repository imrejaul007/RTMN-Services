apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: invoice-ocr-virtualservice
  namespace: rtmz
  labels:
    app: invoice-ocr
spec:
  hosts:
    - invoice-ocr.rtmz.svc.cluster.local
    - invoice-ocr
  http:
    # OCR processing endpoint
    - name: ocr-process
      match:
        - uri:
            prefix: "/process"
        - uri:
            prefix: "/ocr"
      route:
        - destination:
            host: invoice-ocr.rtmz.svc.cluster.local
            port:
              number: 8080
          weight: 100
      retries:
        attempts: 3
        perTryTimeout: 10s
        retryOn: gateway-error,connect-failure,reset
      timeout: 60s
      # Traffic mirroring for validation
      mirrors:
        - destination:
            host: invoice-ocr.rtmz.svc.cluster.local
            port:
              number: 8080
            subset: canary
          weight: 5

    # Batch processing endpoint
    - name: batch-process
      match:
        - uri:
            prefix: "/batch"
      route:
        - destination:
            host: invoice-ocr.rtmz.svc.cluster.local
            port:
              number: 8080
          weight: 100
      retries:
        attempts: 2
        perTryTimeout: 60s
        retryOn: gateway-error
      timeout: 300s

    # Document extraction
    - name: extract
      match:
        - uri:
            prefix: "/extract"
      route:
        - destination:
            host: invoice-ocr.rtmz.svc.cluster.local
            port:
              number: 8080
          weight: 100
      retries:
        attempts: 3
        perTryTimeout: 5s
        retryOn: gateway-error,connect-failure
      timeout: 30s

    # Template matching
    - name: template
      match:
        - uri:
            prefix: "/template"
      route:
        - destination:
            host: invoice-ocr.rtmz.svc.cluster.local
            port:
              number: 8080
          weight: 100
      retries:
        attempts: 3
        perTryTimeout: 8s
        retryOn: gateway-error
      timeout: 45s

    # Validation endpoint
    - name: validate
      match:
        - uri:
            prefix: "/validate"
      route:
        - destination:
            host: invoice-ocr.rtmz.svc.cluster.local
            port:
              number: 8080
          weight: 100
      retries:
        attempts: 2
        perTryTimeout: 3s
      timeout: 15s

    # Health and metrics
    - name: health
      match:
        - uri:
            prefix: "/health"
      route:
        - destination:
            host: invoice-ocr.rtmz.svc.cluster.local
            port:
              number: 8080

    - name: metrics
      match:
        - uri:
            prefix: "/metrics"
      route:
        - destination:
            host: invoice-ocr.rtmz.svc.cluster.local
            port:
              number: 9090

  exportTo:
    - "istio-system"
