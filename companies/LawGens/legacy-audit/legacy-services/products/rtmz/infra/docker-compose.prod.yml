  mcp-payment:
    build: ../apps/mcp/rez-mcp-payment
    ports:
      - "3105:3105"
    depends_on:
      - mongodb
    environment:
      - PORT=3105
      - MONGODB_URI=mongodb://mongodb:27017/rez-payments
      - AUTH_SERVICE_URL=http://rez-auth:4002
      - INTERNAL_SERVICE_TOKEN=mcp-internal-token
    networks:
      - rtmz
    restart: unless-stopped

  mcp-inventory:
    build: ../apps/mcp/rez-mcp-inventory
    ports:
      - "3106:3106"
    depends_on:
      - mongodb
    environment:
      - PORT=3106
      - MONGODB_URI=mongodb://mongodb:27017/rez-inventory
      - AUTH_SERVICE_URL=http://rez-auth:4002
      - INTERNAL_SERVICE_TOKEN=mcp-internal-token
    networks:
      - rtmz
    restart: unless-stopped

  mcp-logs:
    build: ../apps/mcp/rez-mcp-logs
