  mcp-digital-forensics:
    build: ../apps/mcp/rez-mcp-digital-forensics
    ports:
      - "3123:3123"
    depends_on:
      - mongodb
    environment:
      - PORT=3123
      - MONGODB_URI=mongodb://mongodb:27017/rez-forensics
      - AUTH_SERVICE_URL=http://rez-auth:4002
      - INTERNAL_SERVICE_TOKEN=mcp-internal-token
    networks:
      - rtmz
    restart: unless-stopped

  mcp-social-intelligence:
    build: ../apps/mcp/rez-mcp-social-intelligence
    ports:
      - "3130:3130"
    depends_on:
      - mongodb
    environment:
      - PORT=3130
      - MONGODB_URI=mongodb://mongodb:27017/rez-social
      - AUTH_SERVICE_URL=http://rez-auth:4002
      - INTERNAL_SERVICE_TOKEN=mcp-internal-token
    networks:
      - rtmz
    restart: unless-stopped

  mcp-financial-forensics:
    build: ../apps/mcp/rez-mcp-financial-forensics
    ports:
      - "3131:3131"
    depends_on:
      - mongodb
    environment:
