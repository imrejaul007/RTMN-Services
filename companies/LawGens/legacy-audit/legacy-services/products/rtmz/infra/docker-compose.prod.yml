    build: ../apps/services/REZ-forensics-gateway
    ports:
      - "5100:5100"
    depends_on:
      - mongodb
      - mcp-evidence-ingestion
      - mcp-deepfake-detector
      - mcp-chain-of-custody
      - mcp-digital-forensics
      - mcp-social-intelligence
      - mcp-financial-forensics
      - mcp-location-intelligence
      - mcp-expert-reports
    environment:
      - PORT=5100
      - MONGODB_URI=mongodb://mongodb:27017/rez-forensics-gateway
