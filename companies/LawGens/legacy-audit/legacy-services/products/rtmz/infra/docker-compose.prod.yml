  mcp-agent-invoke:
    build: ../apps/mcp/rez-mcp-agent-invoke
    ports:
      - "3109:3109"
    depends_on:
      - graphql-gateway
    environment:
      - PORT=3109
      - GRAPHQL_URL=http://graphql-gateway:5000
      - AUTH_SERVICE_URL=http://rez-auth:4002
      - INTERNAL_SERVICE_TOKEN=mcp-internal-token
    networks:
      - rtmz
    restart: unless-stopped

  mcp-automl:
    build: ../apps/mcp/rez-mcp-automl
    ports:
      - "3110:3110"
    depends_on:
      - automl
    environment:
      - PORT=3110
      - AUTOML_URL=http://automl:5001
      - AUTH_SERVICE_URL=http://rez-auth:4002
      - INTERNAL_SERVICE_TOKEN=mcp-internal-token
    networks:
      - rtmz
    restart: unless-stopped

  mcp-invoice:
    build: ../apps/mcp/rez-mcp-invoice
    ports:
      - "3111:3111"
    depends_on:
      - invoice-ocr
    environment:
      - PORT=3111
      - INVOICE_OCR_URL=http://invoice-ocr:5002
      - AUTH_SERVICE_URL=http://rez-auth:4002
      - INTERNAL_SERVICE_TOKEN=mcp-internal-token
    networks:
      - rtmz
    restart: unless-stopped

  mcp-contracts:
    build: ../apps/mcp/rez-mcp-contracts
    ports:
      - "3112:3112"
    depends_on:
      - contract-mgmt
    environment:
      - PORT=3112
      - CONTRACT_URL=http://contract-mgmt:5003
      - AUTH_SERVICE_URL=http://rez-auth:4002
      - INTERNAL_SERVICE_TOKEN=mcp-internal-token
    networks:
      - rtmz
    restart: unless-stopped

  mcp-legal:
    build: ../apps/mcp/rez-mcp-legal
    ports:
      - "3113:3113"
    depends_on:
      - legal-ai
    environment:
      - PORT=3113
      - LEGAL_AI_URL=http://legal-ai:5004
      - AUTH_SERVICE_URL=http://rez-auth:4002
      - INTERNAL_SERVICE_TOKEN=mcp-internal-token
    networks:
      - rtmz
    restart: unless-stopped

  mcp-cosmic-twin:
    build: ../apps/mcp/rez-mcp-cosmic-twin
    ports:
      - "3114:3114"
    depends_on:
      - cosmic-twin
    environment:
      - PORT=3114
      - COSMIC_TWIN_URL=http://cosmic-twin:5005
      - AUTH_SERVICE_URL=http://rez-auth:4002
      - INTERNAL_SERVICE_TOKEN=mcp-internal-token
    networks:
      - rtmz
    restart: unless-stopped

  mcp-ranking:
    build: ../apps/mcp/rez-mcp-ranking
    ports:
      - "3115:3115"
    depends_on:
      - ranking
    environment:
      - PORT=3115
      - RANKING_URL=http://ranking:5006
      - AUTH_SERVICE_URL=http://rez-auth:4002
      - INTERNAL_SERVICE_TOKEN=mcp-internal-token
    networks:
      - rtmz
    restart: unless-stopped

  # === FORENSICS MCP SERVERS ===
  mcp-evidence-ingestion:
    build: ../apps/mcp/rez-mcp-evidence-ingestion
    ports:
      - "3120:3120"
    depends_on:
      - mongodb
    environment:
      - PORT=3120
      - MONGODB_URI=mongodb://mongodb:27017/rez-evidence
      - AUTH_SERVICE_URL=http://rez-auth:4002
      - INTERNAL_SERVICE_TOKEN=mcp-internal-token
    networks:
      - rtmz
    restart: unless-stopped

  mcp-deepfake-detector:
    build: ../apps/mcp/rez-mcp-deepfake-detector
    ports:
      - "3121:3121"
    depends_on:
      - mongodb
    environment:
      - PORT=3121
      - MONGODB_URI=mongodb://mongodb:27017/rez-deepfake
      - AUTH_SERVICE_URL=http://rez-auth:4002
      - INTERNAL_SERVICE_TOKEN=mcp-internal-token
    networks:
      - rtmz
