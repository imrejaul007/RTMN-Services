    restart: unless-stopped

  mcp-service-discovery:
    build: ../apps/mcp/rez-mcp-service-discovery
    ports:
      - "3108:3108"
    depends_on:
      - redis
    environment:
      - PORT=3108
      - REDIS_URL=redis://redis:6379
