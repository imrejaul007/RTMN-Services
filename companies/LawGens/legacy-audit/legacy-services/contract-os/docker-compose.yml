version: '3.8'
services:
  contract-os:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lawgens-contract-os
    ports:
      - "${PORT:-4190}:4190"
    environment:
      - NODE_ENV=production
      - PORT=4190
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017/contract-os}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    depends_on:
      - mongodb
      - redis
    networks:
      - lawgens-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4190/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  mongodb:
    image: mongo:6-alpine
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - rtnm
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - rtnm
    restart: unless-stopped

networks:
  rtnm:
    driver: bridge

volumes:
  mongo_data:
  redis_data:
