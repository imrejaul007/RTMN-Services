version: '3.8'

# HOJAI AI - Complete Platform Deployment
# All services built June 2026
#
# Usage: docker-compose up -d

services:
  # ============================================
  # DATABASE SERVICES
  # ============================================

  mongodb:
    image: mongo:7-alpine
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - hojai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - hojai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # HOJAI CORE PACKAGES (14 services)
  # ============================================

  hojai-api-gateway:
    build:
      context: ./hojai-core/hojai-api-gateway
      dockerfile: ../../Dockerfile
    ports:
      - "4500:4500"
    environment:
      - NODE_ENV=production
      - PORT=4500
      - MONGODB_URI=mongodb://mongodb:27017/hojai-gateway
      - REDIS_URL=redis://redis:6379
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - hojai-network
    restart: unless-stopped

  hojai-event:
