# HOJAI AI - Nginx Load Balancer Configuration
# SSL Termination + Load Balancing

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml application/xml+rss text/javascript application/x-javascript;

    # Rate Limiting Zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # Upstream Backends
    upstream hojai_api_gateway {
        least_conn;

        server api-gateway-1:4500 weight=5;
        server api-gateway-2:4500 weight=5;
        server api-gateway-3:4500 weight=5;

        keepalive 32;
    }

    upstream hojai_memory {
        server memory:4520;
        keepalive 16;
    }

    upstream hojai_intelligence {
        server intelligence:4530;
        keepalive 16;
    }

    upstream hojai_agents {
        server agents:4550;
        keepalive 16;
    }

    upstream hojai_voice {
        server voice-os:3000;
        keepalive 16;
    }

    # HTTP Server (Redirect to HTTPS)
    server {
        listen 80;
        server_name api.hojai.ai;

        # Let's Encrypt verification
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS Server
    server {
        listen 443 ssl http2;
        server_name api.hojai.ai;

        # SSL Certificate (Let's Encrypt)
        ssl_certificate /etc/letsencrypt/live/api.hojai.ai/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.hojai.ai/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/api.hojai.ai/fullchain.pem;

        # SSL Settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Health check endpoint (no rate limit)
        location /health {
            access_log off;
            return 200 '{"status":"healthy","service":"load-balancer"}\n';
            add_header Content-Type application/json;
        }

        # API Gateway
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;
            limit_conn addr 100;

            proxy_pass http://hojai_api_gateway;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Circuit breaker
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
        }

        # Memory Service
        location /memory/ {
            proxy_pass http://hojai_memory;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Intelligence Service
        location /intelligence/ {
            proxy_pass http://hojai_intelligence;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Agents Service
        location /agents/ {
            proxy_pass http://hojai_agents;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Voice Service (WebSocket support)
        location /voice/ {
            proxy_pass http://hojai_voice;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # Metrics endpoint
        location /metrics {
            proxy_pass http://hojai_api_gateway/metrics;
            access_log off;
        }

        # Default (fallback to API gateway)
        location / {
            proxy_pass http://hojai_api_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Error pages
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
