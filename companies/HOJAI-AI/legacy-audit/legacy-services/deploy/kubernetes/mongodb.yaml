# HOJAI AI - MongoDB Deployment
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: hojai-mongodb
  namespace: hojai
spec:
  serviceName: hojai-mongodb
  replicas: 1
  selector:
    matchLabels:
      app: hojai-mongodb
  template:
    metadata:
      labels:
        app: hojai-mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7.0
          ports:
            - containerPort: 27017
              name: mongodb
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              value: "admin"
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hojai-secrets
                  key: MONGODB_PASSWORD
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - db.adminCommand('ping')
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - db.adminCommand('ping')
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: mongodb-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: hojai-mongodb
  namespace: hojai
spec:
  clusterIP: None
  selector:
    app: hojai-mongodb
  ports:
    - port: 27017
      targetPort: 27017
