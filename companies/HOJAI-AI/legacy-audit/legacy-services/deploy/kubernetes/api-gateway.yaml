# HOJAI AI - API Gateway Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hojai-api-gateway
  namespace: hojai
spec:
  replicas: 3
  selector:
    matchLabels:
      app: hojai-api-gateway
  template:
    metadata:
      labels:
        app: hojai-api-gateway
    spec:
      containers:
        - name: api-gateway
          image: hojai/hojai-api-gateway:latest
          ports:
            - containerPort: 4500
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "4500"
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: hojai-secrets
                  key: MONGODB_URI
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: hojai-secrets
                  key: REDIS_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: hojai-secrets
                  key: JWT_SECRET
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health/live
              port: 4500
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 4500
            initialDelaySeconds: 5
            periodSeconds: 5
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - hojai-api-gateway
                topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: hojai-api-gateway
  namespace: hojai
spec:
  selector:
    app: hojai-api-gateway
  ports:
    - port: 80
      targetPort: 4500
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hojai-api-gateway
  namespace: hojai
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - api.hojai.example.com
      secretName: hojai-api-tls
  rules:
    - host: api.hojai.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hojai-api-gateway
                port:
                  number: 80
