# HOJAI AI - Redis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hojai-redis
  namespace: hojai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hojai-redis
  template:
    metadata:
      labels:
        app: hojai-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          command:
            - redis-server
            - --appendonly
            - "yes"
            - --requirepass
            - $(REDIS_PASSWORD)
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hojai-secrets
                  key: REDIS_PASSWORD
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - redis-cli
                - -a
                - $(REDIS_PASSWORD)
                - ping
            initialDelaySeconds: 10
            periodSeconds: 5
          readinessProbe:
            exec:
              command:
                - redis-cli
                - -a
                - $(REDIS_PASSWORD)
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: hojai-redis
  namespace: hojai
spec:
  selector:
    app: hojai-redis
  ports:
    - port: 6379
      targetPort: 6379
