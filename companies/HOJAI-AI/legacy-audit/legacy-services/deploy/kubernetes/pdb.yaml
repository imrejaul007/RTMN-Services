# HOJAI AI - Pod Disruption Budget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: hojai-api-gateway-pdb
  namespace: hojai
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: hojai-api-gateway
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: hojai-mongodb-pdb
  namespace: hojai
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: hojai-mongodb
