version: '3.8'

services:
  genie-business-intelligence:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: genie-business-intelligence
    ports:
      - "4725:4725"
    environment:
      - NODE_ENV=production
      - PORT=4725
      - SERVICE_NAME=genie-business-intelligence
      - REZ_ORDER_SERVICE_URL=http://rez-order-service:4000
      - REZ_CUSTOMER_SERVICE_URL=http://rez-customer-service:4000
      - REZ_ANALYTICS_SERVICE_URL=http://rez-analytics-service:4000
    networks:
      - rtnm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4725/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  rtnm-network:
    driver: bridge
