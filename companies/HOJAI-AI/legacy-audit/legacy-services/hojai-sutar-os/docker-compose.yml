# SUTAR OS - Complete Docker Compose
version: '3.8'

services:
  sutar-gateway:
    build: ./services/sutar-gateway
    ports:
      - "4140:4140"
    environment:
      - NODE_ENV=production
      - PORT=4140
    networks:
      - sutar-network
    restart: unless-stopped

  sutar-twin-os:
    build: ./services/sutar-twin-os
    ports:
      - "4142:4142"
