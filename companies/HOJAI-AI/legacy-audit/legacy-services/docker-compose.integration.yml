# =============================================================================
# HOJAI AI - RTNM Ecosystem Integration Docker Compose
# Version: 1.0 | Date: June 12, 2026
# =============================================================================
# This compose file integrates HOJAI AI with the RTNM ecosystem
# including RABTUL, REZ Identity Hub, SkillNet, and Industry AI
# =============================================================================

version: '3.8'

services:
  # ============================================================
  # INFRASTRUCTURE
  # ============================================================

  mongodb:
    image: mongo:7.0
    container_name: hojai-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
      MONGO_INITDB_DATABASE: hojai
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - hojai-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: hojai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-password}
    networks:
      - hojai-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # RABTUL CORE SERVICES (RTNM Ecosystem)
  # These services must be running for HOJAI to function
  # ============================================================

  rabtul-auth:
    image: nginx:alpine
    container_name: hojai-rabtul-auth
    restart: unless-stopped
    ports:
      - "4002:80"
    environment:
      - SERVICE_NAME=rabtul-auth
      - SERVICE_URL=http://localhost:4002
    volumes:
      - ./config/rabtul-auth.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - hojai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  rabtul-payment:
    image: nginx:alpine
    container_name: hojai-rabtul-payment
    restart: unless-stopped
    ports:
      - "4001:80"
    environment:
      - SERVICE_NAME=rabtul-payment
      - SERVICE_URL=http://localhost:4001
    volumes:
      - ./config/rabtul-payment.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - hojai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  rabtul-wallet:
    image: nginx:alpine
    container_name: hojai-rabtul-wallet
    restart: unless-stopped
    ports:
      - "4004:80"
    environment:
      - SERVICE_NAME=rabtul-wallet
      - SERVICE_URL=http://localhost:4004
    volumes:
      - ./config/rabtul-wallet.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - hojai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  rabtul-notification:
    image: nginx:alpine
    container_name: hojai-rabtul-notification
    restart: unless-stopped
    ports:
      - "4005:80"
    environment:
      - SERVICE_NAME=rabtul-notification
      - SERVICE_URL=http://localhost:4005
    volumes:
      - ./config/rabtul-notification.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - hojai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================
  # REZ IDENTITY HUB
  # 25-source pre-call research service
  # ============================================================

  rez-identity-hub:
    image: nginx:alpine
    container_name: hojai-rez-identity-hub
    restart: unless-stopped
    ports:
      - "6000:80"
    environment:
      - SERVICE_NAME=rez-identity-hub
      - REZ_IDENTITY_URL=http://localhost:6000
    volumes:
      - ./config/rez-identity.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - hojai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================
  # HOJAI SKILLNET SERVICES
  # AI skills and domain expertise
  # ============================================================

  hojai-skillnet:
    image: nginx:alpine
    container_name: hojai-skillnet
    restart: unless-stopped
    ports:
      - "5130:80"
    environment:
      - SERVICE_NAME=hojai-skillnet
      - SKILLNET_URL=http://localhost:5130
    volumes:
      - ./config/skillnet.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - hojai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  hojai-runtime:
    image: nginx:alpine
    container_name: hojai-runtime
    restart: unless-stopped
    ports:
      - "5120:80"
    environment:
      - SERVICE_NAME=hojai-runtime
      - RUNTIME_URL=http://localhost:5120
    volumes:
      - ./config/runtime.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - hojai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================
  # HOJAI SHARED (Client Library)
  # Shared clients for RTNM integration
  # ============================================================

  hojai-shared:
    build:
      context: ./services/hojai-shared
      dockerfile: Dockerfile
    container_name: hojai-shared
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=4580
      - MONGODB_URI=mongodb://admin:${MONGO_PASSWORD:-password}@mongodb:27017/hojai?authSource=admin
      # RABTUL Services
      - RABTUL_AUTH_URL=http://rabtul-auth:4002
      - RABTUL_PAYMENT_URL=http://rabtul-payment:4001
      - RABTUL_WALLET_URL=http://rabtul-wallet:4004
      - RABTUL_NOTIFICATION_URL=http://rabtul-notification:4005
      # REZ Identity Hub
      - REZ_IDENTITY_URL=http://rez-identity-hub:6000
      # SkillNet
      - SKILLNET_URL=http://hojai-skillnet:5130
      - INTELLIGENCE_URL=http://hojai-skillnet:5130
      - RUNTIME_URL=http://hojai-runtime:5120
    ports:
      - "4580:4580"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - hojai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4580/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================
  # SUTAR OS (Main Orchestration)
  # Connects all RTNM services together
  # ============================================================

  hojai-sutar-os:
    build:
      context: ./hojai-sutar-os
      dockerfile: Dockerfile
    container_name: hojai-sutar-os
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=4750
      - MONGODB_URI=mongodb://admin:${MONGO_PASSWORD:-password}@mongodb:27017/hojai?authSource=admin
      # RABTUL Services
      - RABTUL_AUTH_URL=http://rabtul-auth:4002
      - RABTUL_PAYMENT_URL=http://rabtul-payment:4001
      - RABTUL_WALLET_URL=http://rabtul-wallet:4004
      - RABTUL_NOTIFICATION_URL=http://rabtul-notification:4005
      # REZ Identity Hub
      - REZ_IDENTITY_URL=http://rez-identity-hub:6000
      # SkillNet
      - SKILLNET_URL=http://hojai-skillnet:5130
      - INTELLIGENCE_URL=http://hojai-skillnet:5130
      - RUNTIME_URL=http://hojai-runtime:5120
      # HOJAI Services
      - HOJAI_SHARED_URL=http://hojai-shared:4580
    ports:
      - "4750:4750"
    depends_on:
      mongodb:
        condition: service_healthy
      hojai-shared:
        condition: service_healthy
    networks:
      - hojai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4750/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================
  # GENIE VOICE SERVICE
  # Personal AI assistant
  # ============================================================

  genie-voice:
    build:
      context: ./services/genie-voice
      dockerfile: Dockerfile
    container_name: hojai-genie-voice
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=4760
      - MONGODB_URI=mongodb://admin:${MONGO_PASSWORD:-password}@mongodb:hojai?authSource=admin
      # RABTUL Services
      - RABTUL_AUTH_URL=http://rabtul-auth:4002
      - RABTUL_PAYMENT_URL=http://rabtul-payment:4001
      - RABTUL_WALLET_URL=http://rabtul-wallet:4004
      # REZ Identity Hub
      - REZ_IDENTITY_URL=http://rez-identity-hub:6000
      # SkillNet
      - SKILLNET_URL=http://hojai-skillnet:5130
      # Memory Service
      - GENIE_MEMORY_SERVICE_URL=http://hojai-shared:4580
    ports:
      - "4760:4760"
    depends_on:
      mongodb:
        condition: service_healthy
      hojai-shared:
        condition: service_healthy
    networks:
      - hojai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4760/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================
  # RAZO KEYBOARD (CoPilot Integration)
  # Smart keyboard with Genie and CoPilot
  # ============================================================

  razo-keyboard:
    build:
      context: ./RAZO-Keyboard
      dockerfile: Dockerfile
    container_name: hojai-razo-keyboard
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=4650
      # RABTUL Services
      - RABTUL_AUTH_URL=http://rabtul-auth:4002
      - RABTUL_PAYMENT_URL=http://rabtul-payment:4001
      # Genie Voice
      - GENIE_VOICE_URL=http://genie-voice:4760
      # Memory
      - GENIE_MEMORY_SERVICE_URL=http://hojai-shared:4580
    ports:
      - "4650:4650"
    depends_on:
      genie-voice:
        condition: service_healthy
      hojai-shared:
        condition: service_healthy
    networks:
      - hojai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4650/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================
  # INDUSTRY AI (28 Verticals)
  # Industry-specific AI services
  # ============================================================

  industry-healthcare:
    image: nginx:alpine
    container_name: hojai-industry-healthcare
    restart: unless-stopped
    ports:
      - "3001:80"
    environment:
      - SERVICE_NAME=industry-healthcare
      - INDUSTRY_VERTICAL=healthcare
    networks:
      - hojai-network

  industry-legal:
    image: nginx:alpine
    container_name: hojai-industry-legal
    restart: unless-stopped
    ports:
      - "3002:80"
    environment:
      - SERVICE_NAME=industry-legal
      - INDUSTRY_VERTICAL=legal
    networks:
      - hojai-network

  industry-finance:
    image: nginx:alpine
    container_name: hojai-industry-finance
    restart: unless-stopped
    ports:
      - "3003:80"
    environment:
      - SERVICE_NAME=industry-finance
      - INDUSTRY_VERTICAL=finance
    networks:
      - hojai-network

  industry-realestate:
    image: nginx:alpine
    container_name: hojai-industry-realestate
    restart: unless-stopped
    ports:
      - "3004:80"
    environment:
      - SERVICE_NAME=industry-realestate
      - INDUSTRY_VERTICAL=realestate
    networks:
      - hojai-network

  industry-hospitality:
    image: nginx:alpine
    container_name: hojai-industry-hospitality
    restart: unless-stopped
    ports:
      - "3005:80"
    environment:
      - SERVICE_NAME=industry-hospitality
      - INDUSTRY_VERTICAL=hospitality
    networks:
      - hojai-network

  industry-restaurant:
    image: nginx:alpine
    container_name: hojai-industry-restaurant
    restart: unless-stopped
    ports:
      - "3006:80"
    environment:
      - SERVICE_NAME=industry-restaurant
      - INDUSTRY_VERTICAL=restaurant
    networks:
      - hojai-network

  # ============================================================
  # GENIE MEMORY SERVICE
  # User memory and context storage
  # ============================================================

  genie-memory-service:
    build:
      context: ./services/genie-memory-service
      dockerfile: Dockerfile
    container_name: hojai-genie-memory-service
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=4520
      - MONGODB_URI=mongodb://admin:${MONGO_PASSWORD:-password}@mongodb:27017/hojai?authSource=admin
    ports:
      - "4520:4520"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - hojai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4520/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================
  # BRANDPULSE
  # Brand monitoring and analytics
  # ============================================================

  brandpulse:
    build:
      context: ./hojai-brandpulse
      dockerfile: Dockerfile
    container_name: hojai-brandpulse
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=4770
      - MONGODB_URI=mongodb://admin:${MONGO_PASSWORD:-password}@mongodb:27017/hojai?authSource=admin
    ports:
      - "4770:4770"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - hojai-network

  # ============================================================
  # VOICE TRAINING
  # Voice model training pipeline
  # ============================================================

  voice-training:
    build:
      context: ./voice-training
      dockerfile: Dockerfile
    container_name: hojai-voice-training
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=4780
    ports:
      - "4780:4780"
    networks:
      - hojai-network

  # ============================================================
  # NETWORKS & VOLUMES
  # ============================================================

networks:
  hojai-network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data: