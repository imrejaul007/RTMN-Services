apiVersion: apps/v1
kind: Deployment
metadata:
  name: hojai-skillnet
  namespace: hojai
  labels:
    app: hojai-skillnet
    version: "1.1.0"
    component: intelligence
spec:
  replicas: 3
  selector:
    matchLabels:
      app: hojai-skillnet
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: hojai-skillnet
        version: "1.1.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4530"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: hojai-skillnet
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: hojai-skillnet
          image: ghcr.io/hojai-ai/hojai-skillnet:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 4530
              protocol: TCP
            - name: grpc
              containerPort: 4531
              protocol: TCP
            - name: ws
              containerPort: 4532
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "4530"
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: hojai-skillnet-secrets
                  key: mongodb-uri
                  optional: false
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: hojai-skillnet-secrets
                  key: jwt-secret
                  optional: false
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: hojai-skillnet-config
                  key: cors-origins
                  optional: true
            - name: OTEL_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: hojai-skillnet-config
                  key: otel-enabled
                  optional: true
            - name: OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: hojai-skillnet-config
                  key: otlp-endpoint
                  optional: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - hojai-skillnet
                topologyKey: kubernetes.io/hostname
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: workload-type
                    operator: In
                    values:
                      - general
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: hojai-skillnet
