apiVersion: v1
kind: ConfigMap
metadata:
  name: hojai-skillnet-config
  namespace: hojai
data:
  cors-origins: "https://app.hojai.ai,https://admin.hojai.ai"
  otel-enabled: "false"
  otlp-endpoint: "http://otel-collector.observability:4318"
  node-env: "production"
---
apiVersion: v1
kind: Secret
metadata:
  name: hojai-skillnet-secrets
  namespace: hojai
type: Opaque
stringData:
  mongodb-uri: "mongodb://mongo:27017/hojai-skillnet"
  jwt-secret: "CHANGE_ME_IN_PRODUCTION_32_CHARS"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hojai-skillnet
  namespace: hojai
  labels:
    app: hojai-skillnet
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: hojai-skillnet-pdb
  namespace: hojai
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: hojai-skillnet
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hojai-skillnet-hpa
  namespace: hojai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hojai-skillnet
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 4
          periodSeconds: 15
      selectPolicy: Max
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: hojai-skillnet-network-policy
  namespace: hojai
spec:
  podSelector:
    matchLabels:
      app: hojai-skillnet
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
        - podSelector:
            matchLabels:
              app: nginx-ingress
        - podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 4530
        - protocol: TCP
          port: 4532
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: mongo
      ports:
        - protocol: TCP
          port: 27017
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
