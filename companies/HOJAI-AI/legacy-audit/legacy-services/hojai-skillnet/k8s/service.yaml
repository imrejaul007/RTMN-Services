apiVersion: v1
kind: Service
metadata:
  name: hojai-skillnet
  namespace: hojai
  labels:
    app: hojai-skillnet
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 4530
      targetPort: 4530
      protocol: TCP
    - name: grpc
      port: 4531
      targetPort: 4531
      protocol: TCP
    - name: ws
      port: 4532
      targetPort: 4532
      protocol: TCP
  selector:
    app: hojai-skillnet
---
apiVersion: v1
kind: Service
metadata:
  name: hojai-skillnet-lb
  namespace: hojai
  labels:
    app: hojai-skillnet
spec:
  type: LoadBalancer
  ports:
    - name: http
      port: 80
      targetPort: 4530
      protocol: TCP
    - name: ws
      port: 443
      targetPort: 4532
      protocol: TCP
  selector:
    app: hojai-skillnet
