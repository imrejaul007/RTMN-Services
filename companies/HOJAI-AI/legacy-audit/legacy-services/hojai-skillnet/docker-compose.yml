version: '3.8'

services:
  # HOJAI SkillNet - Combined Service
  hojai-skillnet:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${SKILLNET_PORT:-4530}:4530"
    environment:
      - NODE_ENV=production
      - PORT=4530
      - MONGODB_URI=mongodb://mongodb:27017/hojai-skillnet
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production-32chars}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      - REDIS_URL=redis://redis:6379
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - hojai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4530/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # MongoDB Database
  mongodb:
    image: mongo:7-alpine
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - hojai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - hojai-network
    restart: unless-stopped
    command: redis-server --appendonly yes

  # Prometheus Metrics (optional)
  prometheus:
    image: prom/prometheus:v2.47.0
    ports:
      - "9090:9090"
    volumes:
      - ./alerts/prometheus-alerts.yaml:/etc/prometheus/alerts/hojai-alerts.yaml
      - prometheus_data:/prometheus
    networks:
      - hojai-network
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    profiles:
      - monitoring

  # Grafana Dashboard (optional)
  grafana:
    image: grafana/grafana:10.1.0
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - hojai-network
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    restart: unless-stopped
    profiles:
      - monitoring

networks:
  hojai-network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
  prometheus_data:
  grafana_data: