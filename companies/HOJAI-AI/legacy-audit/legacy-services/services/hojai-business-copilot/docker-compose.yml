version: '3.8'

services:
  # Business Copilot - Main unified entry point
  business-copilot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hojai-business-copilot
    ports:
      - "4600:4600"
    environment:
      - NODE_ENV=production
      - PORT=4600
      - MONGODB_URI=mongodb://mongodb:27017/hojai-business-copilot
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
      # Backing Services
      - MEMORY_SERVICE_URL=http://memory-service:4520
      - TWIN_SERVICE_URL=http://twin-service:4860
      - GRAPH_SERVICE_URL=http://graph-service:4810
      - INTELLIGENCE_SERVICE_URL=http://intelligence-service:4530
      - EXPERT_OS_URL=http://expert-os:4550
      - FLOW_OS_URL=http://flow-os:4244
      - PROJECT_SERVICE_URL=http://project-service:4708
      - SIMULATION_OS_URL=http://simulation-os:4241
    depends_on:
      mongodb:
        condition: service_healthy
      # TODO: Uncomment when backing services are available
      # memory-service:
      #   condition: service_healthy
      # twin-service:
      #   condition: service_healthy
      # graph-service:
      #   condition: service_healthy
      # intelligence-service:
      #   condition: service_healthy
      # expert-os:
      #   condition: service_healthy
      # flow-os:
      #   condition: service_healthy
      # project-service:
      #   condition: service_healthy
      # simulation-os:
      #   condition: service_healthy
    networks:
      - hojai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4600/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # MongoDB for Business Copilot
  mongodb:
    image: mongo:7
    container_name: hojai-copilot-mongodb
    ports:
      - "27018:27017"
    volumes:
      - copilot-mongo-data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=hojai-business-copilot
    networks:
      - hojai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # TODO: Add backing service containers when they are containerized
