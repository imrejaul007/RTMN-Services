version: '3.8'
services:
  hojai-competitive-intelligence:
    build: .
    ports:
      - "${HOJAI_COMPETITIVE_INTELLIGENCE_PORT:-4756}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=${MONGODB_URI:?MONGODB_URI is required}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - HOJAI_COMPETITIVE_INTELLIGENCE_API_KEY=${HOJAI_COMPETITIVE_INTELLIGENCE_API_KEY:?HOJAI_COMPETITIVE_INTELLIGENCE_API_KEY is required}
      - CORS_ORIGIN=${CORS_ORIGIN:-}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - hojai
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
  mongodb:
    image: mongo:6-alpine
    ports:
      - "27019:27017"
    networks:
      - hojai
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - mongodb_data:/data/db
networks:
  hojai:
    driver: bridge
volumes:
  mongodb_data:
