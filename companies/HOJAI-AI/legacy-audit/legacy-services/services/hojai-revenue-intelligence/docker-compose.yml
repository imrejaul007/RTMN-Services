version: '3.8'

services:
  revenue-intelligence:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4757:4757"
    environment:
      - PORT=4757
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017/hojai-revenue-intelligence
      - JWT_SECRET=${JWT_SECRET:-CHANGE_ME}
    depends_on:
      - mongo
    networks:
      - hojai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4757/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - revenue-mongo-data:/data/db
    networks:
      - hojai-network
    restart: unless-stopped

networks:
  hojai-network:
    driver: bridge

volumes:
  revenue-mongo-data:
    driver: local