version: '3.8'
services:
  app:
    build: { context: ., dockerfile: Dockerfile }
    ports: ["${PORT:-4700}:4700"]
    environment:
      - NODE_ENV=production
      - PORT=4700
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    depends_on: [mongodb]
    networks: [rtnm]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4700/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  mongodb:
    image: mongo:6-alpine
    ports: ["27017:27017"]
    volumes: [mongo_data:/data/db]
    networks: [rtnm]
    restart: unless-stopped

networks:
  rtnm: { driver: bridge }

volumes:
  mongo_data:
