version: '3.8'

services:
  genie-memory-review-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${GENIE-MEMORY-REVIEW-SERVICE_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=${MONGODB_URI:?MONGODB_URI is required}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    depends_on:
      - mongodb
      - redis
    networks:
      - hojai
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  mongodb:
    image: mongo:6-alpine
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - hojai
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - hojai
    restart: unless-stopped

networks:
  hojai:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
