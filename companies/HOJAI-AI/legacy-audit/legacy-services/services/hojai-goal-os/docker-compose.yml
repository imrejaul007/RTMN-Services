version: '3.8'

services:
  hojai-goal-os:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hojai-goal-os
    ports:
      - "4242:4242"
    environment:
      - NODE_ENV=production
      - PORT=4242
      - MONGODB_URI=mongodb://mongo:27017/hojai-goal-os
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    depends_on:
      - mongo
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4242/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mongo:
    image: mongo:7
    container_name: hojai-goal-os-mongo
    volumes:
      - goal-os-data:/data/db
    ports:
      - "27027:27017"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  goal-os-data: