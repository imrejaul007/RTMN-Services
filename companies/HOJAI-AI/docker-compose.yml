  # Phase 38: AI Studio
  ai-studio:
    build: ./platform/studio/ai-studio
    ports: ['4890:4890']
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4890/health']
      interval: 30s
