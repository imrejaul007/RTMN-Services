      test: ['CMD', 'curl', '-f', 'http://localhost:4900/health']
      interval: 30s

  # Phase 37: Event Platform
  event-platform:
    build: ./platform/intelligence/event-platform
    ports: ['4901:4901']
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4901/health']
      interval: 30s

  # Phase 34: Workflow Registry
  workflow-registry:
    build: ./platform/studio/workflow-registry
    ports: ['4902:4902']
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4902/health']
      interval: 30s

  # Phase 35: Twin Registry
  twin-registry:
    build: ./platform/twins/twin-registry
    ports: ['4903:4903']
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4903/health']
      interval: 30s

  # Phase 24: Tenant Isolation
  tenant-isolation:
    build: ./platform/multi-tenant/tenant-isolation
    ports: ['4904:4904']
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4904/health']
      interval: 30s

  # Phase 30: Fine-Tuning
  fine-tuning:
    build: ./platform/training/fine-tuning
    ports: ['4610:4610']
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4610/health']
