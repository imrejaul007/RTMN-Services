apiVersion: v1
kind: Namespace
metadata:
  name: hojai
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-os
  namespace: hojai
spec:
  replicas: 3
  selector:
    matchLabels:
      app: agent-os
  template:
    metadata:
      labels:
        app: agent-os
    spec:
      containers:
      - name: agent-os
        image: hojai/agent-os:latest
        ports:
        - containerPort: 4892
        envFrom:
        - secretRef:
            name: hojai-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: agent-os
  namespace: hojai
spec:
  selector:
    app: agent-os
  ports:
  - port: 4892
    targetPort: 4892
  type: LoadBalancer
