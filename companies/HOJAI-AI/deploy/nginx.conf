worker_processes auto;
error_log /var/log/nginx/error.log;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  upstream agent-os { server agent-os:4892; }
  upstream personalization { server personalization:4893; }
  upstream ai-economy { server ai-economy:4894; }
  upstream governance { server governance:4895; }
  upstream planning-engine { server planning-engine:4896; }
  upstream multi-modal { server multi-modal:4897; }
  upstream aiops { server aiops:4898; }
  upstream memory-lifecycle { server memory-lifecycle:4899; }
  upstream knowledge-registry { server knowledge-registry:4900; }
  upstream event-platform { server event-platform:4901; }
  upstream workflow-registry { server workflow-registry:4902; }
  upstream twin-registry { server twin-registry:4903; }
  upstream tenant-isolation { server tenant-isolation:4904; }
  upstream fine-tuning { server fine-tuning:4610; }
  upstream eval-continuous { server eval-continuous:4888; }
  upstream ai-studio { server ai-studio:4890; }

  server {
    listen 80;
    server_name api.hojai.ai;

    location /api/agents/ { proxy_pass http://agent-os; }
    location /api/profiles/ { proxy_pass http://personalization; }
    location /api/listings/ { proxy_pass http://ai-economy; }
    location /api/wallets/ { proxy_pass http://ai-economy; }
    location /api/policies/ { proxy_pass http://governance; }
    location /api/plans/ { proxy_pass http://planning-engine; }
    location /api/multi-modal/ { proxy_pass http://multi-modal; }
    location /api/metrics/ { proxy_pass http://aiops; }
    location /api/alerts/ { proxy_pass http://aiops; }
    location /api/incidents/ { proxy_pass http://aiops; }
    location /api/memories/ { proxy_pass http://memory-lifecycle; }
    location /api/assets/ { proxy_pass http://knowledge-registry; }
    location /api/events/ { proxy_pass http://event-platform; }
    location /api/templates/ { proxy_pass http://workflow-registry; }
    location /api/types/ { proxy_pass http://twin-registry; }
    location /api/instances/ { proxy_pass http://twin-registry; }
    location /api/assignments/ { proxy_pass http://tenant-isolation; }
    location /api/datasets/ { proxy_pass http://fine-tuning; }
    location /api/jobs/ { proxy_pass http://fine-tuning; }
    location /api/runs/ { proxy_pass http://eval-continuous; }
    location /api/workflows/ { proxy_pass http://ai-studio; }

    location / {
      return 200 '{"status":"ok","service":"hojai-gateway","version":"5.15"}';
      add_header Content-Type application/json;
    }
  }
}
