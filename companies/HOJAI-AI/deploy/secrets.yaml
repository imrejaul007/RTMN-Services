apiVersion: v1
kind: Secret
metadata:
  name: hojai-secrets
type: Opaque
stringData:
  # Agent OS
  AGENT_OS_SECRET: "change-me-in-production"

  # Fine-tuning
  OPENAI_API_KEY: "sk-change-me"
  ANTHROPIC_API_KEY: "sk-ant-change-me"

  # Database
  DATABASE_URL: "postgresql://user:pass@localhost:5432/hojai"
  REDIS_URL: "redis://localhost:6379"

  # Auth
  JWT_SECRET: "change-me-32-chars-minimum"
  SESSION_SECRET: "change-me-session"

  # Storage
  S3_BUCKET: "hojai-uploads"
  AWS_ACCESS_KEY_ID: "change-me"
  AWS_SECRET_ACCESS_KEY: "change-me"

  # Monitoring
  GRAFANA_PASSWORD: "admin"
  PROMETHEUS_PASSWORD: "prom-admin"
