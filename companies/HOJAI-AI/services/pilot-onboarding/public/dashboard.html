<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RTMN - Real-Time Multi-Industry Network</title>
<style>
  :root { --bg: #0f172a; --surface: #1e293b; --border: #334155; --primary: #3b82f6; --primary-hover: #2563eb; --success: #22c55e; --text: #f1f5f9; --muted: #94a3b8; --danger: #ef4444; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }

  /* Nav */
  nav { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid var(--border); }
  nav .logo { font-size: 1.25rem; font-weight: 700; color: var(--primary); }
  nav .logo span { color: var(--text); }
  nav .nav-links a { color: var(--muted); text-decoration: none; margin-left: 24px; font-size: 0.9rem; transition: color .2s; }
  nav .nav-links a:hover { color: var(--text); }
  nav .nav-links .btn-nav { background: var(--primary); color: #fff; padding: 8px 16px; border-radius: 6px; }
  nav .nav-links .btn-nav:hover { background: var(--primary-hover); }

  /* Hero */
  .hero { text-align: center; padding: 80px 0 60px; }
  .hero h1 { font-size: 3rem; font-weight: 800; line-height: 1.1; margin-bottom: 16px; }
  .hero h1 .blue { color: var(--primary); }
  .hero p { font-size: 1.2rem; color: var(--muted); max-width: 600px; margin: 0 auto 32px; }
  .hero-badges { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 40px; }
  .badge { background: var(--surface); border: 1px solid var(--border); padding: 6px 14px; border-radius: 99px; font-size: 0.8rem; color: var(--muted); }
  .badge .count { color: var(--success); font-weight: 700; }

  /* Cards grid */
  .services-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; margin: 40px 0; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; transition: border-color .2s, transform .2s; }
  .card:hover { border-color: var(--primary); transform: translateY(-2px); }
  .card .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .card .card-title { font-size: 1rem; font-weight: 600; }
  .card .card-port { font-size: 0.75rem; color: var(--muted); background: var(--bg); padding: 2px 8px; border-radius: 4px; }
  .card .card-desc { font-size: 0.85rem; color: var(--muted); margin-bottom: 12px; line-height: 1.5; }
  .card .card-footer { display: flex; justify-content: space-between; align-items: center; }
  .card .price { font-size: 0.9rem; color: var(--success); font-weight: 600; }
  .card .price.custom { color: var(--muted); font-size: 0.8rem; }
  .card .btn { background: var(--primary); color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; transition: background .2s; }
  .card .btn:hover { background: var(--primary-hover); }
  .card .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .card .btn.active { background: var(--success); }
  .card .pilot-ready { font-size: 0.7rem; color: var(--success); border: 1px solid var(--success); padding: 2px 6px; border-radius: 4px; }

  /* Forms */
  .auth-section { display: flex; gap: 40px; max-width: 900px; margin: 60px auto; }
  .auth-box { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 32px; }
  .auth-box h2 { font-size: 1.4rem; margin-bottom: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 6px; }
  .form-group input, .form-group select { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 10px 12px; border-radius: 6px; font-size: 0.9rem; transition: border-color .2s; }
  .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--primary); }
  .btn-full { width: 100%; background: var(--primary); color: #fff; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-size: 0.95rem; font-weight: 600; margin-top: 8px; transition: background .2s; }
  .btn-full:hover { background: var(--primary-hover); }
  .btn-full.success { background: var(--success); }
  .error-msg { color: var(--danger); font-size: 0.85rem; margin-top: 8px; padding: 8px 12px; background: rgba(239,68,68,.1); border-radius: 6px; }
  .success-msg { color: var(--success); font-size: 0.85rem; margin-top: 8px; padding: 8px 12px; background: rgba(34,197,94,.1); border-radius: 6px; }
  .muted-msg { color: var(--muted); font-size: 0.8rem; margin-top: 8px; }

  /* Dashboard */
  .dashboard { margin: 40px 0; }
  .dash-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .dash-header h2 { font-size: 1.5rem; }
  .dash-stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; margin-bottom: 32px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; text-align: center; }
  .stat-card .stat-value { font-size: 2rem; font-weight: 700; color: var(--primary); }
  .stat-card .stat-label { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }
  .service-row { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
  .service-row .svc-name { font-weight: 600; }
  .service-row .svc-plan { color: var(--muted); font-size: 0.85rem; }
  .service-row .svc-status { font-size: 0.75rem; padding: 4px 10px; border-radius: 99px; font-weight: 600; }
  .service-row .svc-status.active { background: rgba(34,197,94,.15); color: var(--success); }
  .service-row .svc-status.pending { background: rgba(251,191,36,.15); color: #fbbf24; }
  .service-row .svc-status.pending_payment { background: rgba(59,130,246,.15); color: var(--primary); }

  /* Logout */
  .logout-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
  .logout-btn:hover { border-color: var(--danger); color: var(--danger); }

  /* Verify banner */
  .verify-banner { background: rgba(251,191,36,.15); border: 1px solid rgba(251,191,36,.4); border-radius: 8px; padding: 12px 20px; margin-bottom: 20px; color: #fbbf24; font-size: 0.9rem; }

  /* Tab nav */
  .tab-nav { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
  .tab-btn { background: none; border: none; color: var(--muted); padding: 10px 16px; cursor: pointer; font-size: 0.9rem; border-bottom: 2px solid transparent; transition: all .2s; }
  .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
  .tab-btn:hover { color: var(--text); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Loading */
  .loading { opacity: 0.6; pointer-events: none; }

  /* API test */
  .api-test { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-top: 20px; }
  .api-test h3 { font-size: 1rem; margin-bottom: 12px; color: var(--muted); }
  .api-test .endpoint { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .api-test .method { font-size: 0.75rem; font-weight: 700; padding: 3px 8px; border-radius: 4px; }
  .api-test .method.get { background: rgba(34,197,94,.2); color: var(--success); }
  .api-test .method.post { background: rgba(59,130,246,.2); color: var(--primary); }
  .api-test code { font-size: 0.85rem; color: var(--text); }
  .api-test .result { font-size: 0.8rem; color: var(--muted); margin-top: 4px; padding: 8px 12px; background: var(--bg); border-radius: 6px; max-height: 120px; overflow-y: auto; }

  /* Footer */
  footer { border-top: 1px solid var(--border); padding: 32px 0; margin-top: 80px; text-align: center; color: var(--muted); font-size: 0.85rem; }

  @media (max-width: 640px) {
    .hero h1 { font-size: 2rem; }
    .auth-section { flex-direction: column; }
    .services-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<nav>
  <div class="container" style="display:flex;justify-content:space-between;align-items:center">
    <div class="logo">RTMN <span>/ Pilot Portal</span></div>
    <div class="nav-links" id="navLinks"></div>
  </div>
</nav>

<div class="container" id="app"></div>

<footer>
  <div class="container">
    RTMN Real-Time Multi-Industry Network &nbsp;|&nbsp; 24 Industries &nbsp;|&nbsp; 35+ Digital Twins<br>
    <span style="font-size:0.75rem">Foundation: CorpID · MemoryOS · GoalOS · Decision Engine · Agent Economy</span>
  </div>
</footer>

<script>
const API = 'http://localhost:4399';
let token = localStorage.getItem('rtmn_token') || null;
let client = null;

// ── Render ──────────────────────────────────────────────────────────────────

function render(html) {
  document.getElementById('app').innerHTML = html;
}

function renderNav() {
  const links = document.getElementById('navLinks');
  if (token) {
    links.innerHTML = `
      <a href="#" onclick="showDashboard();return false">Dashboard</a>
      <a href="#" onclick="showCatalog();return false">Services</a>
      <button class="logout-btn" onclick="logout()">Logout</button>`;
  } else {
    links.innerHTML = `
      <a href="#" onclick="showHome();return false">Home</a>
      <a href="#" onclick="showAuth();return false">Login</a>
      <a href="#" class="btn-nav" onclick="showAuth();return false">Get Started</a>`;
  }
}

// ── Pages ───────────────────────────────────────────────────────────────────

async function showHome() {
  const services = await fetchJSON('/v1/services');
  renderNav();
  let grid = services?.items?.map(s => `
    <div class="card">
      <div class="card-header">
        <span class="card-title">${s.name}</span>
        <span class="card-port">:${s.port}</span>
      </div>
      <p class="card-desc">${s.description}</p>
      <div class="card-footer">
        <span class="price">${s.price.pilot === 0 ? '<span class="custom">Custom</span>' : '$' + s.price.pilot + '/mo'}</span>
        ${s.pilotReady ? '<span class="pilot-ready">PILOT</span>' : ''}
      </div>
    </div>`).join('') || '';

  render(`
    <div class="hero">
      <h1>Your business,<br><span class="blue">24 industries</span>, one platform</h1>
      <p>AI-powered digital twins for every vertical. From Hotel to Healthcare to Agriculture — connected, not siloed.</p>
      <div class="hero-badges">
        <span class="badge"><span class="count">24</span> Industry OS</span>
        <span class="badge"><span class="count">35+</span> Digital Twins</span>
        <span class="badge"><span class="count">6</span> AI Agents</span>
        <span class="badge">RABTUL · CorpID · MemoryOS</span>
      </div>
      <button class="btn-full" style="max-width:280px" onclick="showAuth()">Start Your Pilot — Free</button>
    </div>
    <h2 style="margin-top:48px;margin-bottom:8px;font-size:1.2rem;color:var(--muted)">Pilot-Ready Industries</h2>
    <div class="services-grid">${grid}</div>`);
}

async function showAuth() {
  renderNav();
  render(`
    <div class="auth-section">
      <div class="auth-box">
        <h2>Create Account</h2>
        <div id="signup-msg"></div>
        <form onsubmit="handleSignup(event)">
          <div class="form-group">
            <label>Contact Name</label>
            <input type="text" id="s_name" required placeholder="Rejaul Karim">
          </div>
          <div class="form-group">
            <label>Company Name</label>
            <input type="text" id="s_company" required placeholder="My Hotel Group">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="s_email" required placeholder="you@company.com">
          </div>
          <div class="form-group">
            <label>Phone (optional)</label>
            <input type="tel" id="s_phone" placeholder="+91 98765 43210">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="s_pass" required minlength="8" placeholder="8+ characters">
          </div>
          <button type="submit" class="btn-full" id="signup-btn">Create Account</button>
          <p class="muted-msg" style="margin-top:12px">By creating an account you agree to our Terms of Service and Privacy Policy.</p>
        </form>
      </div>
      <div class="auth-box">
        <h2>Sign In</h2>
        <div id="login-msg"></div>
        <form onsubmit="handleLogin(event)">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="l_email" required placeholder="you@company.com">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="l_pass" required>
          </div>
          <button type="submit" class="btn-full success" id="login-btn">Sign In</button>
        </form>
        <div style="margin-top:20px;padding:16px;background:var(--bg);border-radius:8px;border:1px solid var(--border)">
          <p style="font-size:0.8rem;color:var(--muted);margin-bottom:8px">Demo credentials:</p>
          <p style="font-size:0.8rem">Email: <code>pilot@example.com</code></p>
          <p style="font-size:0.8rem">Password: <code>testpass123</code></p>
          <button onclick="fillDemo()" style="margin-top:8px;background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:0.8rem">Fill demo</button>
        </div>
      </div>
    </div>`);
}

function fillDemo() {
  document.getElementById('l_email').value = 'pilot@example.com';
  document.getElementById('l_pass').value = 'testpass123';
}

async function handleSignup(e) {
  e.preventDefault();
  const btn = document.getElementById('signup-btn');
  const msg = document.getElementById('signup-msg');
  btn.disabled = true; btn.textContent = 'Creating...';

  const body = {
    email: document.getElementById('s_email').value,
    password: document.getElementById('s_pass').value,
    companyName: document.getElementById('s_company').value,
    contactName: document.getElementById('s_name').value,
    phone: document.getElementById('s_phone').value || undefined
  };

  try {
    const res = await fetch(API + '/v1/auth/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Signup failed');
    msg.innerHTML = `<div class="success-msg">
      <strong>Account created!</strong> Check your email to verify, or use the dev link below.<br>
      ${data.devVerifyUrl ? `<a href="${data.devVerifyUrl}" style="color:var(--primary);word-break:break-all">${data.devVerifyUrl}</a>` : ''}
    </div>`;
    btn.textContent = 'Check your email';
  } catch (err) {
    msg.innerHTML = `<div class="error-msg">${err.message}</div>`;
    btn.disabled = false; btn.textContent = 'Create Account';
  }
}

async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const msg = document.getElementById('login-msg');
  btn.disabled = true; btn.textContent = 'Signing in...';

  try {
    const res = await fetch(API + '/v1/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: document.getElementById('l_email').value, password: document.getElementById('l_pass').value })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Login failed');
    token = data.token;
    client = data.client;
    localStorage.setItem('rtmn_token', token);
    msg.innerHTML = `<div class="success-msg">Signed in as ${client.email}. Loading dashboard...</div>`;
    setTimeout(showDashboard, 800);
  } catch (err) {
    msg.innerHTML = `<div class="error-msg">${err.message}</div>`;
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}

function logout() {
  token = null; client = null;
  localStorage.removeItem('rtmn_token');
  showHome();
}

async function showDashboard() {
  if (!token) return showAuth();
  renderNav();

  try {
    const res = await fetch(API + '/v1/auth/me', { headers: { Authorization: `Bearer ${token}` } });
    if (!res.ok) { logout(); return; }
    client = await res.json();
  } catch { logout(); return; }

  const services = await fetchJSON('/v1/services');

  const pendingBanner = client.status !== 'active'
    ? `<div class="verify-banner">⚠️ Email not verified. Check your inbox or use the verification link from signup.</div>` : '';

  const myServices = client.services.map(s => `
    <div class="service-row">
      <div>
        <div class="svc-name">${services?.items?.find(x => x.id === s.serviceId)?.name || s.serviceId}</div>
        <div class="svc-plan">${s.plan} plan · $${s.pricing?.monthly}/mo · port ${s.port}</div>
      </div>
      <span class="svc-status ${s.status}">${s.status}</span>
    </div>`).join('') || '<p style="color:var(--muted)">No services selected yet.</p>';

  const healthChecks = client.services.filter(s => s.status === 'active').map(s => {
    const name = services?.items?.find(x => x.id === s.serviceId)?.name || s.serviceId;
    return `<div class="api-test">
      <h3>${name} (port ${s.port})</h3>
      <div class="endpoint"><span class="method get">GET</span><code>/health</code></div>
      <button onclick="testApi('${s.serviceId}','${s.port}')" style="background:var(--primary);color:#fff;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:0.8rem;margin-bottom:8px">Test</button>
      <div class="result" id="result-${s.serviceId}">Click Test to call...</div>
    </div>`;
  }).join('') || '<p style="color:var(--muted)">Provision a service above to test its API.</p>';

  render(`
    <div class="dashboard">
      <div class="dash-header">
        <h2>👋 Welcome, ${client.contactName}</h2>
        <span style="color:var(--muted);font-size:0.85rem">${client.companyName}</span>
      </div>
      ${pendingBanner}
      <div class="dash-stats">
        <div class="stat-card"><div class="stat-value">${client.services.length}</div><div class="stat-label">Services</div></div>
        <div class="stat-card"><div class="stat-value">${client.services.filter(s=>s.status==='active').length}</div><div class="stat-label">Active</div></div>
        <div class="stat-card"><div class="stat-value">${client.status}</div><div class="stat-label">Account</div></div>
        <div class="stat-card"><div class="stat-value">${client.id.slice(0,8)}</div><div class="stat-label">Client ID</div></div>
      </div>

      <div class="tab-nav">
        <button class="tab-btn active" onclick="switchTab(this,'my-services')">My Services</button>
        <button class="tab-btn" onclick="switchTab(this,'catalog')">Service Catalog</button>
        <button class="tab-btn" onclick="switchTab(this,'api-tests')">API Tests</button>
      </div>

      <div id="tab-my-services" class="tab-content active">${myServices}</div>
      <div id="tab-catalog" class="tab-content">${renderCatalog(services)}</div>
      <div id="tab-api-tests" class="tab-content">${healthChecks}</div>
    </div>`);
}

function renderCatalog(services) {
  if (!services?.items) return '<p style="color:var(--muted)">Loading...</p>';
  return `<div class="services-grid">${services.items.map(s => `
    <div class="card">
      <div class="card-header">
        <span class="card-title">${s.name}</span>
        <span class="card-port">:${s.port}</span>
      </div>
      <p class="card-desc">${s.description}</p>
      <div class="card-footer">
        <span class="price">${s.price.pilot === 0 ? '<span class="custom">Custom</span>' : '$' + s.price.pilot + '/mo'}</span>
        ${s.pilotReady ? '<span class="pilot-ready">PILOT</span>' : ''}
      </div>
      ${client?.services?.some(x=>x.serviceId===s.id) ? '<button class="btn active" style="width:100%;margin-top:10px" disabled>✓ Selected</button>'
        : `<button class="btn" style="width:100%;margin-top:10px" onclick="selectService('${s.id}')">Select</button>`}
    </div>`).join('')}</div>`;
}

function switchTab(btn, id) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + id).classList.add('active');
}

async function selectService(serviceId) {
  try {
    const res = await fetch(API + '/v1/services/select', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ serviceId, plan: 'pilot' })
    });
    const data = await res.json();
    if (!res.ok) { alert(data.error || 'Failed'); return; }

    // Mock checkout → activate
    if (data.selection?.status === 'pending_payment') {
      await mockConfirm(data.selection.serviceId);
    }
    showDashboard();
  } catch (err) { alert(err.message); }
}

async function mockConfirm(serviceId) {
  const res = await fetch(API + '/v1/billing/checkout', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
    body: JSON.stringify({ serviceId, plan: 'pilot' })
  });
  const data = await res.json();
  if (data.paymentId) {
    await fetch(API + '/v1/billing/mock-confirm/' + data.paymentId, {
      method: 'POST',
      headers: { Authorization: `Bearer ${token}` }
    });
  }
}

async function testApi(serviceId, port) {
  const el = document.getElementById('result-' + serviceId);
  el.textContent = 'Testing...';
  try {
    // Call directly (bypass proxy for demo)
    const res = await fetch(`http://localhost:${port}/health`);
    const text = await res.text();
    let formatted;
    try { formatted = JSON.stringify(JSON.parse(text), null, 2); } catch { formatted = text; }
    el.textContent = `✅ ${res.status} OK\n${formatted}`;
    el.style.color = 'var(--success)';
  } catch (err) {
    el.textContent = `❌ Service not reachable on port ${port}\nIs it running? Start with: cd services/${serviceId} && npm start`;
    el.style.color = 'var(--danger)';
  }
}

// ── Utils ───────────────────────────────────────────────────────────────────

async function fetchJSON(path) {
  try {
    const res = await fetch(API + path);
    return await res.json();
  } catch { return null; }
}

// ── Boot ─────────────────────────────────────────────────────────────────────

if (token) {
  showDashboard();
} else {
  showHome();
}
</script>
</body>
</html>
