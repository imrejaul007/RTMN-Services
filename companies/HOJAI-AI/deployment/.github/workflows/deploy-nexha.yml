name: Deploy Nexha Services

on:
  push:
    branches:
      - main
    paths:
      - 'Nexha/services/**'
      - 'deployment/**'
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy'
        required: false
        type: choice
        options:
          - all
          - nexha-supplier-network
          - nexha-supplier-registry
          - nexha-pricing-network
          - nexha-distribution-network
          - nexha-trade-finance-network
          - nexha-warehouse-network
          - nexha-federation-os
          - nexha-business-directory
          - nexha-acp-messaging
          - nexha-commerce-runtime

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}
  NODE_VERSION: '20'

jobs:
  deploy-supplier-network:
    runs-on: ubuntu-latest
    if: github.event.inputs.service == 'all' || github.event.inputs.service == 'nexha-supplier-network'

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./Nexha/services/nexha-supplier-network
          push: true
          tags: |
            ${{ env.REGISTRY }}/nexha-supplier-network:${{ github.sha }}
            ${{ env.REGISTRY }}/nexha-supplier-network:latest

  deploy-supplier-registry:
    runs-on: ubuntu-latest
    if: github.event.inputs.service == 'all' || github.event.inputs.service == 'nexha-supplier-registry'

    steps:
      - uses: actions/checkout@v4
