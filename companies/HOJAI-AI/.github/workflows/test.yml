name: CI

on:
  push:
    branches: [main, feat/*]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run lint
        run: npm run lint 2>/dev/null || echo "No lint script"

      - name: Run tests
        run: npm test -- --reporter=verbose --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

      - name: Build Docker images
        run: |
          for svc in platform/intelligence/agent-os platform/intelligence/personalization platform/intelligence/ai-economy platform/intelligence/governance platform/intelligence/planning-engine platform/intelligence/multi-modal platform/aiops platform/memory/memory-lifecycle platform/intelligence/knowledge-registry platform/intelligence/event-platform platform/studio/workflow-registry platform/twins/twin-registry platform/training/fine-tuning platform/training/eval-platform/eval-continuous platform/studio/ai-studio platform/multi-tenant/tenant-isolation; do
            if [ -f "$svc/Dockerfile" ]; then
              echo "Building $svc"
              docker build -t hojai-$svc:latest $svc 2>/dev/null || true
            fi
          done

  docker-compose-test:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build docker-compose
        run: docker-compose build --parallel

      - name: Test services start
        run: docker-compose up -d && sleep 10 && docker-compose ps
