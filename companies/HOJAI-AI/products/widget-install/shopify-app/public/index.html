<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="HOJAI SiteOS - AI-powered customer engagement for Shopify stores" />
    <meta name="robots" content="noindex, nofollow" />

    <!-- Shopify App Bridge will inject here -->
    <title>HOJAI SiteOS</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="https://cdn.hojai.ai/favicon.svg" />

    <!-- Preconnect to external resources -->
    <link rel="preconnect" href="https://cdn.hojai.ai" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        background-color: #f6f9fc;
        color: #212b36;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Loading state */
      .app-loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
      }

      .app-loading-spinner {
        width: 48px;
        height: 48px;
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 16px;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      .app-loading-text {
        font-size: 16px;
        font-weight: 500;
      }

      /* Error state */
      .app-error {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
        text-align: center;
      }

      .app-error-icon {
        width: 64px;
        height: 64px;
        margin-bottom: 16px;
        color: #dc3545;
      }

      .app-error-title {
        font-size: 24px;
        font-weight: 600;
        margin-bottom: 8px;
        color: #212b36;
      }

      .app-error-message {
        font-size: 14px;
        color: #637381;
        max-width: 400px;
      }

      /* Hidden app container (React will mount here) */
      #app {
        display: none;
      }

      #app.mounted {
        display: block;
      }
    </style>
  </head>
  <body>
    <!-- Loading state (shown before React mounts) -->
    <div id="app-loading" class="app-loading">
      <div class="app-loading-spinner"></div>
      <div class="app-loading-text">Loading HOJAI SiteOS...</div>
    </div>

    <!-- Error state (fallback if JS fails) -->
    <noscript>
      <div class="app-error">
        <svg class="app-error-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
        <h1 class="app-error-title">JavaScript Required</h1>
        <p class="app-error-message">Please enable JavaScript to use the HOJAI SiteOS app.</p>
      </div>
    </noscript>

    <!-- React App Root -->
    <div id="app"></div>

    <!-- Error boundary fallback -->
    <script>
      // Hide loading spinner and show app
      window.addEventListener('DOMContentLoaded', function() {
        setTimeout(function() {
          var loading = document.getElementById('app-loading');
          if (loading) {
            loading.style.display = 'none';
          }
          var app = document.getElementById('app');
          if (app) {
            app.classList.add('mounted');
          }
        }, 100);
      });

      // Global error handler
      window.onerror = function(message, source, lineno, colno, error) {
        console.error('Global error:', { message, source, lineno, colno, error });
        var loading = document.getElementById('app-loading');
        if (loading) {
          loading.innerHTML = '<div class="app-error"><h1 class="app-error-title">Something went wrong</h1><p class="app-error-message">Please refresh the page or try again later.</p></div>';
        }
        return false;
      };
    </script>

    <!-- Main application bundle (generated by Vite) -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
