# Docker Compose for Employee Twin Ecosystem
# Version: 1.0.0
# Date: June 26, 2026

version: '3.8'

services:
  # ============================================
  # PHASE 1: CORE TWINS
  # ============================================

  memory-twin:
    build: ./twins/memory-twin
    container_name: memory-twin
    ports:
      - "4738:4738"
    environment:
      - NODE_ENV=production
      - PORT=4738
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4738/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 3s
      retries: 3
    restart: unless-stopped

