name: PolicyOS CI

on:
  push:
    branches: [main, develop, 'feat/**']
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  PORT: 4254

jobs:
  # =================================================================
  # Quality checks (no service required)
  # =================================================================
  quality:
    name: Quality (Lint + Format + Check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npx prettier --check "src/**/*.js" "__tests__/**/*.mjs" "tests/*.sh"

      - name: Syntax check
        run: npm run check

  # =================================================================
  # Unit tests (no service required)
  # =================================================================
  unit-tests:
    name: Unit Tests (Node test runner)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: node --test __tests__/unit/events.test.mjs __tests__/unit/auth.test.mjs

  # =================================================================
  # Integration tests (service must be running)
  # =================================================================
  integration-tests:
    name: Integration Tests (service running)
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create data directory
        run: mkdir -p data/policy-os

      - name: Start PolicyOS
        run: node src/index.js &
        env:
          PORT: ${{ env.PORT }}
          POLICYOS_REQUIRE_AUTH: 'false'
          NODE_ENV: 'test'

      - name: Wait for service
        run: npx wait-on tcp:${{ env.PORT }}

      - name: Run smoke tests
        run: bash tests/smoke.sh

      - name: Run e2e tests
        run: bash tests/e2e.sh

      - name: Run expression tests
        run: bash tests/expression.test.sh

      - name: Run persistence tests
        run: bash tests/persistence.test.sh

  # =================================================================
  # Docker build
  # =================================================================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: hojai/policy-os
          tags: |
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
