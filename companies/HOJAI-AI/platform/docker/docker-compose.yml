version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: hojai-db
    environment:
      POSTGRES_USER: hojai
      POSTGRES_PASSWORD: hojai_secure_password_change_me
      POSTGRES_DB: hojai_production
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hojai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (for sessions, cache)
  redis:
    image: redis:7-alpine
    container_name: hojai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # HOJAI API Gateway
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hojai-api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://hojai:hojai_secure_password_change_me@postgres:5432/hojai_production
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Flow Runtime (worker)
  flow-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: hojai-flow-worker
    command: node dist/workers/flow-worker.js
    environment:
      DATABASE_URL: postgresql://hojai:hojai_secure_password_change_me@postgres:5432/hojai_production
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy

  # Agent Runtime (worker)
  agent-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: hojai-agent-worker
    command: node dist/workers/agent-worker.js
    environment:
      DATABASE_URL: postgresql://hojai:hojai_secure_password_change_me@postgres:5432/hojai_production
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy

  # Cron Scheduler
  scheduler:
    image: node:20-alpine
    container_name: hojai-scheduler
    command: node scripts/scheduler.js
    volumes:
      - ./:/app
    environment:
      DATABASE_URL: postgresql://hojai:hojai_secure_password_change_me@postgres:5432/hojai_production
      TZ: Asia/Kolkata
    depends_on:
      postgres:
        condition: service_healthy

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: hojai-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./certs:/etc/nginx/certs
    depends_on:
      - api

  # Prometheus Metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: hojai-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  # Grafana Dashboard
  grafana:
    image: grafana/grafana
    container_name: hojai-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: hojai-network
