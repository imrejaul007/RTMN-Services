version: '3.8'

services:
  # ===== DATA LAYER =====
  postgres:
    image: postgres:16-alpine
    container_name: hojai-postgres
    environment:
      POSTGRES_USER: hojai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hojai_secure_change_me}
      POSTGRES_DB: hojai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hojai"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hojai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ===== API LAYER =====
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: hojai-api
    ports:
      - "4500:4500"
    environment:
      PORT: 4500
      NODE_ENV: production
      # Twilio
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER}
      AI_CALLBACK_URL: ${AI_CALLBACK_URL}
      # WhatsApp
      WA_PHONE_ID: ${WA_PHONE_ID}
      WA_ACCESS_TOKEN: ${WA_ACCESS_TOKEN}
      WA_BUSINESS_ID: ${WA_BUSINESS_ID}
      WA_VERIFY_TOKEN: ${WA_VERIFY_TOKEN}
      WA_APP_SECRET: ${WA_APP_SECRET}
      # Background Check
      BACKGROUND_CHECK_API_KEY: ${BACKGROUND_CHECK_API_KEY}
      # Meeting Recording
      MEETING_PROVIDER: zoom
      ZOOM_CLIENT_ID: ${ZOOM_CLIENT_ID}
      ZOOM_CLIENT_SECRET: ${ZOOM_CLIENT_SECRET}
      ZOOM_ACCOUNT_ID: ${ZOOM_ACCOUNT_ID}
      ZOOM_WEBHOOK_SECRET: ${ZOOM_WEBHOOK_SECRET}
      # LLM APIs
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AI_AGENT_URL: ${AI_AGENT_URL}
      AI_ENGINE_URL: ${AI_ENGINE_URL}
      KB_SERVICE_URL: ${KB_SERVICE_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ===== FRONTEND =====
  studio:
    image: nginx:alpine
    container_name: hojai-studio
    ports:
      - "3001:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: hojai-network
