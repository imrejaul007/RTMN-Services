openapi: 3.0.3
info:
  title: TwinOS Hub API
  description: |
    TwinOS Hub is the central orchestrator for all Digital Twins in the RTMN ecosystem.

    ## Features
    - Twin Registry (CRUD operations)
    - Twin Identity, Profile, Context, State, Lifecycle
    - Twin Timeline, Goals, Knowledge References
    - Twin Collaboration and Simulation
    - **v3.1**: Relationship Enrichment, Path Finding, Temporal History, Auto-Linking

    ## Authentication
    Most endpoints require JWT Bearer token authentication.
    Some read endpoints support optional authentication.
  version: 3.1.0
  contact:
    name: HOJAI AI
    email: dev@hojai.ai
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:4705
    description: Local development
  - url: https://api.rtmn.io/twinos
    description: Production

tags:
  - name: Health
    description: Service health endpoints
  - name: Twins
    description: Twin CRUD operations
  - name: Relationships
    description: Relationship graph management
  - name: Graph
    description: Path finding and graph traversal (v3.1)
  - name: Auto-Link
    description: Automatic relationship linking (v3.1)
  - name: Analytics
    description: Twin analytics and statistics

paths:
  /health:
    get:
      tags: [Health]
      summary: Service health check
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /ready:
    get:
      tags: [Health]
      summary: Service readiness check
      responses:
        '200':
          description: Service is ready

  # ============ Twin CRUD ============
  /api/twins:
    get:
      tags: [Twins]
      summary: List all twins
      security:
        - bearerAuth: []
      parameters:
        - name: type
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of twins
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  twins:
                    type: array
                    items:
                      $ref: '#/components/schemas/Twin'

    post:
      tags: [Twins]
      summary: Create a new twin
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TwinCreate'
      responses:
        '201':
          description: Twin created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TwinResponse'

  /api/twins/{id}:
    get:
      tags: [Twins]
      summary: Get twin by ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Twin found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TwinResponse'
        '404':
          description: Twin not found

    put:
      tags: [Twins]
      summary: Update twin
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TwinUpdate'
      responses:
        '200':
          description: Twin updated

    delete:
      tags: [Twins]
      summary: Delete twin
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Twin deleted

  # ============ Relationship Graph ============
  /api/relationships:
    get:
      tags: [Relationships]
      summary: List relationships
      security:
        - bearerAuth: []
      parameters:
        - name: sourceId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of relationships

    post:
      tags: [Relationships]
      summary: Create relationship
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RelationshipCreate'
      responses:
        '201':
          description: Relationship created

  /api/relationships/{id}:
    put:
      tags: [Relationships]
      summary: Update relationship
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RelationshipUpdate'
      responses:
        '200':
          description: Relationship updated

    delete:
      tags: [Relationships]
      summary: Delete relationship
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Relationship deleted

  /api/relationships/types:
    get:
      tags: [Relationships]
      summary: Get valid relationship types
      responses:
        '200':
          description: List of valid types
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  types:
                    type: array
                    items:
                      type: string

  /api/relationships/graph/{twinId}:
    get:
      tags: [Relationships]
      summary: Walk relationship graph (BFS)
      parameters:
        - name: twinId
          in: path
          required: true
          schema:
            type: string
        - name: depth
          in: query
          schema:
            type: integer
            default: 2
        - name: type
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Graph traversal results

  # ============ Phase 1: Relationship Enrichment ============
  /api/relationships/{id}/interact:
    post:
      tags: [Relationships]
      summary: Record interaction (Phase 1)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                interaction_type:
                  type: string
                memory_id:
                  type: string
                trust_delta:
                  type: number
                strength_delta:
                  type: number
      responses:
        '200':
          description: Interaction recorded
        '404':
          description: Relationship not found

  /api/relationships/enriched:
    get:
      tags: [Relationships]
      summary: Query enriched relationships (Phase 1)
      security:
        - bearerAuth: []
      parameters:
        - name: min_trust
          in: query
          schema:
            type: number
        - name: min_strength
          in: query
          schema:
            type: number
        - name: active_only
          in: query
          schema:
            type: boolean
        - name: source_type
          in: query
          schema:
            type: string
        - name: target_type
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Enriched relationships

  /api/relationships/{twinId}/enrichment-stats:
    get:
      tags: [Relationships]
      summary: Get enrichment statistics (Phase 1)
      parameters:
        - name: twinId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Enrichment statistics

  # ============ Phase 2: Path Finding ============
  /api/graph/path:
    get:
      tags: [Graph]
      summary: Find shortest path between twins (Phase 2)
      parameters:
        - name: from
          in: query
          required: true
          schema:
            type: string
        - name: to
          in: query
          required: true
          schema:
            type: string
        - name: maxHops
          in: query
          schema:
            type: integer
            default: 5
        - name: type
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Shortest path found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  path:
                    type: array
                    items:
                      $ref: '#/components/schemas/Twin'
                  hops:
                    type: integer
                  pathTypes:
                    type: array
                    items:
                      type: string

  /api/graph/connected:
    get:
      tags: [Graph]
      summary: Find all connected twins (Phase 2)
      parameters:
        - name: twinId
          in: query
          required: true
          schema:
            type: string
        - name: hops
          in: query
          schema:
            type: integer
            default: 2
        - name: minStrength
          in: query
          schema:
            type: number
        - name: minTrust
          in: query
          schema:
            type: number
      responses:
        '200':
          description: Connected twins

  /api/graph/path-validate:
    post:
      tags: [Graph]
      summary: Validate path exists (Phase 2)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                path:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Path validation result

  # ============ Phase 3: Temporal History ============
  /api/relationships/{twinId}/history:
    get:
      tags: [Relationships]
      summary: Query relationships at point in time (Phase 3)
      parameters:
        - name: twinId
          in: path
          required: true
          schema:
            type: string
        - name: at
          in: query
          schema:
            type: string
            format: date-time
        - name: include
          in: query
          schema:
            type: string
            enum: [all, expired, active]
      responses:
        '200':
          description: Historical relationships

  /api/relationships/{twinId}/timeline:
    get:
      tags: [Relationships]
      summary: Get temporal timeline (Phase 3)
      parameters:
        - name: twinId
          in: path
          required: true
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
        - name: granularity
          in: query
          schema:
            type: string
            enum: [day, week, month]
      responses:
        '200':
          description: Timeline events

  /api/relationships/{twinId}/{relationshipId}/evolution:
    get:
      tags: [Relationships]
      summary: Track metric evolution (Phase 3)
      parameters:
        - name: twinId
          in: path
          required: true
          schema:
            type: string
        - name: relationshipId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Evolution timeline

  # ============ Phase 4: Auto-Linking ============
  /api/auto-link/suggest:
    post:
      tags: [Auto-Link]
      summary: Suggest relationship links (Phase 4)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                twinId:
                  type: string
                strategy:
                  type: string
                  enum: [memory, attribute, behavior, all]
                minConfidence:
                  type: number
                  default: 0.5
                maxSuggestions:
                  type: integer
                  default: 10
      responses:
        '200':
          description: Suggested links

  /api/auto-link/create:
    post:
      tags: [Auto-Link]
      summary: Create relationships from suggestions (Phase 4)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                twinId:
                  type: string
                suggestions:
                  type: array
                  items:
                    type: object
                dryRun:
                  type: boolean
                  default: false
      responses:
        '200':
          description: Creation results

  /api/auto-link/jobs:
    post:
      tags: [Auto-Link]
      summary: Start auto-link job (Phase 4)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                twinId:
                  type: string
                strategy:
                  type: string
                minConfidence:
                  type: number
                schedule:
                  type: string
                  enum: [once, hourly, daily]
      responses:
        '200':
          description: Job started

  /api/auto-link/jobs/{jobId}:
    get:
      tags: [Auto-Link]
      summary: Get job status (Phase 4)
      security:
        - bearerAuth: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job status

    delete:
      tags: [Auto-Link]
      summary: Cancel job (Phase 4)
      security:
        - bearerAuth: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job cancelled

  /api/auto-link/stats:
    get:
      tags: [Auto-Link]
      summary: Get auto-linking statistics (Phase 4)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Statistics

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
        service:
          type: string
        version:
          type: string
        timestamp:
          type: string
          format: date-time

    Twin:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
        category:
          type: string
        status:
          type: string
        health:
          type: string
        createdAt:
          type: string
          format: date-time
        metadata:
          type: object

    TwinCreate:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          pattern: '^[a-z0-9-_.]+$'
        name:
          type: string
        type:
          type: string
        category:
          type: string
        metadata:
          type: object

    TwinUpdate:
      type: object
      properties:
        name:
          type: string
        metadata:
          type: object

    TwinResponse:
      type: object
      properties:
        success:
          type: boolean
        twin:
          $ref: '#/components/schemas/Twin'

    RelationshipCreate:
      type: object
      required:
        - sourceId
        - targetId
        - type
      properties:
        sourceId:
          type: string
        targetId:
          type: string
        type:
          type: string
          enum:
            - owns
            - belongs_to
            - manages
            - reports_to
            - purchased
            - follows
            - parent
            - child
            - supplier
            - customer
            - member
            - partner
            - competitor
            - related_to
            - has
            - part_of
            - depends_on
            - references
        metadata:
          type: object
          properties:
            strength:
              type: number
              minimum: 0
              maximum: 1
            trust_score:
              type: number
              minimum: 0
              maximum: 100

    RelationshipUpdate:
      type: object
      properties:
        type:
          type: string
        metadata:
          type: object
        strength:
          type: number
        trust_score:
          type: number
        shared_memories:
          type: integer
        until:
          type: string
