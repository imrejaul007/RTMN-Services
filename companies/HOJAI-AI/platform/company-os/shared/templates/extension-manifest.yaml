# Industry Extension Manifest Template

id: "{{extension_id}}"
name: "{{extension_name}}"
version: "1.0.0"
description: "{{extension_description}}"

industry: "{{industry}}"
vertical: "{{vertical}}"

dependencies:
  required:
    - finance
    - operations
  optional:
    - marketing

extends:
  company:
    - addCapability: "{{capability}}"
    - addTwin: "{{twin_type}}"

modules: []

specificity:
  totalLOC: 0
  verticalLOC: 0
  ratio: 0.0

legacy:
  source: "{{legacy_service}}"
  port: {{port}}
  adapterRequired: true
  routeMapping: {}
