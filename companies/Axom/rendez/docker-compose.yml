version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rendez
      POSTGRES_PASSWORD: rendez_dev
      POSTGRES_DB: rendez
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  backend:
    build: ./rendez-backend
    ports:
      - '4000:4000'
    environment:
      DATABASE_URL: postgresql://rendez:rendez_dev@postgres:5432/rendez
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    volumes:
      - ./rendez-backend:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:
