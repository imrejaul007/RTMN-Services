; ===========================================
; PgBouncer Configuration
; ===========================================
; Lightweight PostgreSQL connection pooler
; Reduces connection overhead by pooling connections
; ===========================================

[databases]
; Map logical database name to physical
rendez = host=postgres port=5432 dbname=rendez_dev

[pgbouncer]
; Connection settings
listen_port = 6432
listen_addr = 0.0.0.0

; Auth settings
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
admin_users = rendez_admin

; Pool settings
pool_mode = transaction
max_client_conn = 100
default_pool_size = 20
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3

; Timeouts (in seconds)
server_login_retry = 3
query_wait_timeout = 30
idle_transaction_timeout = 60

; Logging
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1

; Health check
server_reset_query = DISCARD ALL
server_check_delay = 30
server_lifetime = 3600
server_idle_timeout = 600
