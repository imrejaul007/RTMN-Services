name: RTMN Unified Hub — CI

on:
  push:
    branches: [main, 'docs/**']
    paths:
      - 'services/rtmn-unified-hub/**'
  pull_request:
    branches: [main]
    paths:
      - 'services/rtmn-unified-hub/**'

concurrency:
  group: hub-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/rtmn-unified-hub

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/rtmn-unified-hub/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npx vitest run --reporter=verbose

      - name: Build
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: hub-dist
          path: services/rtmn-unified-hub/dist/
          retention-days: 7
