# Render Blueprint - RTMN Services
# Deploy to: render blueprint create --spec render.yaml
# Docs: https://render.com/docs/blueprint-spec

services:
  # ── PILOT ONBOARDING (Client-facing gateway) ────────────────────
  - type: web
    name: rtmn-pilot-onboarding
    runtime: node
    region: singapore
    plan: free
    rootDir: services/pilot-onboarding
    buildCommand: npm install --legacy-peer-deps
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "10000"
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: noreply@rtmn.io
      - key: EMAIL_REPLY_TO
        value: support@rtmn.io
      - key: ALLOWED_ORIGINS
        sync: false
      - key: PUBLIC_URL
        sync: false

