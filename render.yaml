  # ============================================
  # ADBAZAAR / CRM SERVICES
  # ============================================

  - type: web
    name: rez-crm-hub
    env: node
    region: singapore
    plan: free
    rootDir: companies/AdBazaar/REZ-crm-hub
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 4056
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: INTERNAL_SERVICE_TOKEN
        generateValue: true
      - key: ALLOWED_ORIGINS
        # Set to your Vercel frontend URL, e.g. https://rtmn.vercel.app
        sync: false
      - key: PUBLIC_URL
        sync: false

