# Render Blueprint - RTMN Customer Operations OS
# Deploy to: render blueprint create --spec render.yaml
# Docs: https://render.com/docs/blueprint-spec

services:
  # ═══════════════════════════════════════════════════════════════════════
  # PILOT ONBOARDING (Client-facing gateway)
  # ═══════════════════════════════════════════════════════════════════════
  - type: web
    name: rtmn-pilot-onboarding
    runtime: node
    region: singapore
    plan: starter
    rootDir: services/pilot-onboarding
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "10000"
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: MONGODB_URI
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: noreply@rtmn.io
      - key: EMAIL_REPLY_TO
        value: support@rtmn.io
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: PUBLIC_URL
        value: https://rtmn.io

