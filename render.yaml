    rootDir: companies/RTNM-Digital/REZ-SalesMind
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 5170
      - key: NODE_ENV
        value: production
      - key: INTERNAL_SERVICE_TOKEN
        # Must match CRM Hub's INTERNAL_SERVICE_TOKEN
        generateValue: true
      - key: CRM_HUB_TOKEN
        # Must match CRM Hub's INTERNAL_SERVICE_TOKEN
        generateValue: true
      - key: REZ_CRM_HUB
        value: https://rez-crm-hub.onrender.com
      - key: ALLOWED_ORIGINS
        # Set to your Vercel frontend URL, e.g. https://rtmn.vercel.app
        sync: false

