# ===================================================================
# Prometheus Alert Rules for RTMN
# ===================================================================

groups:
  # ---- Service Health Alerts ----
  - name: service_health
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.instance }} is DOWN"
          description: "Service {{ $labels.instance }} has been down for more than 2 minutes"

      - alert: ServiceUnhealthy
        expr: up == 0
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "Service {{ $labels.instance }} is unhealthy"

      # ---- SutAR OS Specific ----
      - alert: SutARGatewayDown
        expr: up{job="sutar-os", instance=~".*sutar-gateway.*"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "SutAR Gateway (4140) is DOWN - all SutAR services affected"

      - alert: SutARHighLatency
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "SutAR service {{ $labels.instance }} p99 latency > 2s"

      # ---- HOJAI AI Specific ----
      - alert: HOJAIHighLatency
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "HOJAI service {{ $labels.instance }} p99 latency > 3s"

      - alert: HOJAIHighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "HOJAI service {{ $labels.instance }} error rate > 10%"

      # ---- RABTUL Specific ----
      - alert: RABTULAuthDown
        expr: up{job="rabtul-services", instance=~".*rez-auth-service.*"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "RABTUL Auth Service is DOWN - all authenticated requests will fail"

      - alert: RABTULPaymentDown
        expr: up{job="rabtul-services", instance=~".*rez-payment-service.*"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "RABTUL Payment Service is DOWN - payments cannot be processed"

      - alert: EventBusDown
        expr: up{instance=~".*rez-event-bus.*"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Event Bus (4510) is DOWN - async messaging broken"

  # ---- Resource Alerts ----
  - name: resource_alerts
    rules:
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "CPU usage > 80% on {{ $labels.instance }}"

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Memory usage > 85% on {{ $labels.instance }}"

      - alert: DiskSpaceLow
        expr: (1 - (node_filesystem_avail_bytes{fstype!="tmpfs"} / node_filesystem_size_bytes{fstype!="tmpfs"})) * 100 > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Disk usage > 85% on {{ $labels.instance }}"

  # ---- Database Alerts ----
  - name: database_alerts
    rules:
      - alert: MongoDBDown
        expr: up{job="mongodb"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "MongoDB is DOWN"

      - alert: MongoDBHighConnections
        expr: mongodb_ss_connections > 5000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "MongoDB connections > 5000"

      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is DOWN"
