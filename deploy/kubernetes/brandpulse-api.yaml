# =============================================================================
# RTMN BrandPulse API - Kubernetes Deployment Manifest
# =============================================================================
# Contains: Namespace, ConfigMap, Secret, Deployment, HPA, Service, Ingress
# =============================================================================

---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: rtmn
  labels:
    name: rtmn
    environment: production
    managed-by: kubectl
---
# ConfigMap - Non-sensitive configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: brandpulse-api-config
  namespace: rtmn
  labels:
    app: brandpulse-api
    tier: api
    environment: production
data:
  NODE_ENV: "production"
  PORT: "4770"
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
  # MongoDB URI (base64 encoded in secret for production)
  MONGODB_URI: "mongodb+srv://user:password@cluster.mongodb.net/brandpulse?retryWrites=true&w=majority"
  # Redis URL (base64 encoded in secret for production)
  REDIS_URL: "rediss://:password@redis.cloud:6379"
  # RTMN SDK Configuration
  RTNM_SDK_URL: "https://api.rtmn.io"
  # CORS Configuration
  CORS_ORIGIN: "https://dashboard.rtmn.io,https://app.rtmn.io"
  # Rate Limiting
  RATE_LIMIT_MAX: "1000"
  RATE_LIMIT_WINDOW_MS: "60000"
  # Feature Flags
  FEATURE_AI_INSIGHTS: "true"
  FEATURE_ADVANCED_ANALYTICS: "true"
  FEATURE_REAL_TIME_COLLABORATION: "true"
  # Performance Tuning
  WORKER_THREADS: "4"
  DB_CONNECTION_POOL_SIZE: "20"
  CACHE_TTL_SHORT: "300"
  CACHE_TTL_MEDIUM: "3600"
  CACHE_TTL_LONG: "86400"
---
# Secret - Sensitive configuration (base64 encoded)
apiVersion: v1
kind: Secret
metadata:
  name: brandpulse-api-secrets
  namespace: rtmn
  labels:
    app: brandpulse-api
    tier: api
    environment: production
type: Opaque
data:
  # Replace these placeholder values with actual base64 encoded secrets
  # Generate with: echo -n 'your-secret-value' | base64
  RTMN_API_KEY: cGxhY2Vob2xkZXItYXBpLWtleS1oZXJl
  RTNM_SDK_KEY: cGxhY2Vob2xkZXItc2RrLWtleS1oZXJl
  JWT_SECRET: cGxhY2Vob2xkZXItand0LXNlY3JldC1oZXJlLWdlbmVyYXRlLXdpdGgtb3BlbnNzbC1yYW5kLWJhc2U2NC02NA==
  SESSION_SECRET: cGxhY2Vob2xkZXItc2Vzc2lvbi1zZWNyZXQtaGVyZS1nZW5lcmF0ZS13aXRoLW9wZW5zc2wtcmFuZC1iYXNlNjQtNjQ=
  SENTRY_DSN: aHR0cHM6Ly94eHh4QHNlbnRyeS5pby94eHh4
  STRIPE_SECRET_KEY: c2tfbGl2ZV94eHh4eF95b3VyX3N0cmlwZV9zZWNyZXRfa2V5
  STRIPE_WEBHOOK_SECRET: d2hzZWNfeHh4eF95b3VyX3dlYmhvb2stc2VjcmV0
  OPENAI_API_KEY: c2steHh4eF95b3VyX29wZW5haS1hcGkta2V5
---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: brandpulse-api
  namespace: rtmn
  labels:
    app: brandpulse-api
    tier: api
    environment: production
    version: "1.0.0"
spec:
  # Number of replicas
  replicas: 3

  # Rolling update strategy
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  # Selector for pods
  selector:
    matchLabels:
      app: brandpulse-api
      tier: api

  # Pod template
  template:
    metadata:
      labels:
        app: brandpulse-api
        tier: api
        environment: production
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4770"
        prometheus.io/path: "/metrics"
    spec:
      # Security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault

      # Service account
      serviceAccountName: brandpulse-api

      # Termination grace period
      terminationGracePeriodSeconds: 60

      # Init containers (if needed for migrations)
      initContainers:
        - name: wait-for-dependencies
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for MongoDB..."
              until nc -z mongodb 27017; do
                echo "MongoDB is not ready, waiting..."
                sleep 5
              done
              echo "MongoDB is ready!"
              echo "Waiting for Redis..."
              until nc -z redis 6379; do
                echo "Redis is not ready, waiting..."
                sleep 5
              done
              echo "Redis is ready!"
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

      # Main container
      containers:
        - name: brandpulse-api
          image: ghcr.io/rtmn-group/brandpulse:latest
          imagePullPolicy: Always

          # Ports
          ports:
            - name: http
              containerPort: 4770
              protocol: TCP

          # Environment variables from secrets
          envFrom:
            - secretRef:
                name: brandpulse-api-secrets

          # Environment variables from configmap
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: brandpulse-api-config
                  key: NODE_ENV
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: brandpulse-api-config
                  key: PORT
            - name: MONGODB_URI
              valueFrom:
                configMapKeyRef:
                  name: brandpulse-api-config
                  key: MONGODB_URI
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: brandpulse-api-config
                  key: REDIS_URL
            - name: RTNM_SDK_URL
              valueFrom:
                configMapKeyRef:
                  name: brandpulse-api-config
                  key: RTNM_SDK_URL
            - name: CORS_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: brandpulse-api-config
                  key: CORS_ORIGIN
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: brandpulse-api-config
                  key: LOG_LEVEL

          # Resource requests and limits
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi

          # Liveness probe
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          # Readiness probe
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1

          # Startup probe (for slow starting pods)
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30

          # Security context
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          # Volume mounts
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/.cache

      # Volumes
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 100Mi
        - name: cache
          emptyDir:
            medium: Memory
            sizeLimit: 256Mi

      # Affinity rules
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - brandpulse-api
                topologyKey: kubernetes.io/hostname
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 50
              preference:
                matchExpressions:
                  - key: node-type
                    operator: In
                    values:
                      - application

      # Tolerations
      tolerations:
        - key: "dedicated"
          operator: "Equal"
          value: "application"
          effect: "NoSchedule"
        - key: "node.kubernetes.io/not-ready"
          operator: "Exists"
          effect: "NoExecute"
          tolerationSeconds: 300
        - key: "node.kubernetes.io/unreachable"
          operator: "Exists"
          effect: "NoExecute"
          tolerationSeconds: 300

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: brandpulse-api-hpa
  namespace: rtmn
  labels:
    app: brandpulse-api
    tier: api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: brandpulse-api

  # Scaling boundaries
  minReplicas: 3
  maxReplicas: 20

  # Metrics for scaling
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

  # Scaling behavior
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
        - type: Percent
          value: 10
          periodSeconds: 60
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 5
          periodSeconds: 15
        - type: Percent
          value: 100
          periodSeconds: 15
      selectPolicy: Max

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: brandpulse-api
  namespace: rtmn
  labels:
    app: brandpulse-api
    tier: api
    environment: production
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "4770"
spec:
  type: ClusterIP

  # Session affinity
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800

  selector:
    app: brandpulse-api
    tier: api

  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP

---
# Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: brandpulse-api
  namespace: rtmn
  labels:
    app: brandpulse-api
    tier: api
  annotations:
    # NGINX Ingress Controller
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"

    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # WebSocket support
    nginx.ingress.kubernetes.io/use-regex: "true"

    # Cert-manager
    cert-manager.io/cluster-issuer: letsencrypt-prod

    # Custom metrics
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "50"

spec:
  ingressClassName: nginx

  tls:
    - hosts:
        - api.rtmn.io
      secretName: brandpulse-api-tls

  rules:
    - host: api.rtmn.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: brandpulse-api
                port:
                  number: 80
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: brandpulse-api
                port:
                  number: 80

---
# PodDisruptionBudget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: brandpulse-api-pdb
  namespace: rtmn
  labels:
    app: brandpulse-api
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: brandpulse-api

---
# ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: brandpulse-api
  namespace: rtmn
  labels:
    app: brandpulse-api
