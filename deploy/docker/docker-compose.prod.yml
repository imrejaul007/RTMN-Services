# RTMN BrandPulse Production Docker Compose
# Version: 3.8
#
# Usage:
#   docker-compose -f docker-compose.prod.yml up -d
#   docker-compose -f docker-compose.prod.yml logs -f

version: "3.8"

services:
  # Redis Cache Layer
  redis:
    image: redis:7-alpine
    container_name: rtmn-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - rtmn-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # MongoDB Database (Atlas Connection)
  # Note: In production, use MongoDB Atlas connection string
  # This service is for local development only
  mongodb:
    image: mongo:7.0
    container_name: rtmn-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: brandpulse
    volumes:
      - mongodb_data:/data/db
      - ./mongodb/mongod.conf:/etc/mongo/mongod.conf:ro
    networks:
      - rtmn-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "200m"
        max-file: "10"

  # BrandPulse API Service
  brandpulse-api:
    build:
      context: ../products/brandpulse
      dockerfile: ../deploy/docker/Dockerfile.brandpulse
      args:
        NODE_ENV: production
    container_name: rtmn-brandpulse-api
    restart: unless-stopped
    ports:
      - "4770:4770"
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      PORT: 4770
      MONGODB_URI: ${MONGODB_URI:-mongodb+srv://admin:changeme@mongodb:27017/brandpulse?retryWrites=true&w=majority}
      REDIS_URL: ${REDIS_URL:-redis://:changeme@redis:6379}
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - rtmn-network
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4770/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 10s
        order: start-first
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # BrandPulse Dashboard (React Frontend)
  brandpulse-dashboard:
    build:
      context: ../products/brandpulse-dashboard
      dockerfile: ../deploy/docker/Dockerfile.brandpulse-dashboard
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.rtmn.io}
    container_name: rtmn-brandpulse-dashboard
    restart: unless-stopped
    ports:
      - "4780:4780"
    environment:
      NODE_ENV: production
      PORT: 4780
    depends_on:
      - brandpulse-api
    networks:
      - rtmn-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4780"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # Nginx Reverse Proxy & Load Balancer
  nginx:
    image: nginx:1.25-alpine
    container_name: rtmn-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_logs:/var/log/nginx
      - ./nginx/cache:/var/cache/nginx:rw
    depends_on:
      brandpulse-api:
        condition: service_healthy
      brandpulse-dashboard:
        condition: service_healthy
    networks:
      - rtmn-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

# Networks
networks:
  rtmn-network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-rtmn
      com.docker.network.bridge.enable_icc: "true"
      com.docker.network.bridge.enable_ip_masquerade: "true"
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1

# Volumes
volumes:
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/redis
  mongodb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/mongodb
  nginx_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./logs/nginx
