# =============================================================================
# RTMN BrandPulse - Nginx Production Configuration
# =============================================================================
# Handles reverse proxy, SSL termination, load balancing, and caching
# =============================================================================

# Worker processes - auto-detect CPU cores
worker_processes auto;

# Error log configuration
error_log /var/log/nginx/error.log warn;

# PID file location
pid /var/run/nginx.pid;

# Include mime types
include /etc/nginx/mime.types;

# Default MIME type
default_type application/octet-stream;

# =============================================================================
# Logging Format
# =============================================================================
log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                '$status $body_bytes_sent "$http_referer" '
                '"$http_user_agent" "$http_x_forwarded_for" '
                'rt=$request_time uct=$upstream_connect_time '
                'uht=$upstream_header_time urt=$upstream_response_time';

# Access log
access_log /var/log/nginx/access.log main;

# =============================================================================
# Performance Tuning
# =============================================================================
# Sendfile for efficient static file serving
sendfile on;

# TCP_NOPUSH for sendfile
tcp_nopush on;

# TCP_NODELAY for keep-alive connections
tcp_nodelay on;

# Buffer size for client body
client_body_buffer_size 16k;

# Buffer size for client header
client_header_buffer_size 1k;

# Maximum client body size (100MB for file uploads)
client_max_body_size 100m;

# Timeouts
keepalive_timeout 65;
keepalive_requests 1000;

# Timeout for reading client request body
client_body_timeout 12;

# Timeout for reading client request header
client_header_timeout 12;

# Timeout for sending data to client
send_timeout 10;

# =============================================================================
# Gzip Compression
# =============================================================================
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_buffers 16 8k;
gzip_http_version 1.1;
gzip_min_length 256;
gzip_types
    application/atom+xml
    application/clockwork+json
    application/geo+json
    application/javascript
    application/json
    application/ld+json
    application manifest+json
    application/rss+xml
    application/vnd.api+json
    application/vnd.ms-fontobject
    application/wasm
    application/x-web-app-manifest+json
    application/xhtml+xml
    application/xml
    application/ecmascript
    application/ogg
    application/pdf
    application/typescript
    font/collection
    font/eot
    font/otf
    font/ttc
    font/ttf
    font/woff
    font/woff2
    image/bmp
    image/svg+xml
    image/x-icon
    text/cache-manifest
    text/calendar
    text/css
    text/csv
    text/html
    text/javascript
    text/javascript; charset=utf-8
    text/markdown
    text/plain
    text/xml
    text/vcard
    text/vtt
    text/x-component
    text/x-cross-domain-policy
    text/x-java-source
    text/x-script
    text/x-component
    text/x-set-timeout;

# =============================================================================
# Upstream Definitions
# =============================================================================
upstream brandpulse_api {
    # Least connections load balancing
    least_conn;

    # API servers
    server brandpulse-api:4770 max_fails=3 fail_timeout=30s;

    # Keep-alive connections to upstream
    keepalive 32;
}

upstream brandpulse_dashboard {
    # Least connections load balancing
    least_conn;

    # Dashboard servers
    server brandpulse-dashboard:4780 max_fails=3 fail_timeout=30s;

    # Keep-alive connections to upstream
    keepalive 16;
}

# =============================================================================
# Rate Limiting Zones
# =============================================================================
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=addr:10m;

# =============================================================================
# HTTP Server - Redirect to HTTPS
# =============================================================================
server {
    listen 80;
    listen [::]:80;
    server_name api.rtmn.io dashboard.rtmn.io;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }

    # Health check endpoint (HTTP only for load balancer health checks)
    location /health {
        proxy_pass http://brandpulse_api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # Block hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# =============================================================================
# HTTPS Server - API
# =============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.rtmn.io;

    # SSL Certificate Configuration
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # SSL Protocols and Ciphers
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;

    # SSL Session Configuration
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.rtmn.io wss://api.rtmn.io" always;

    # Rate Limiting
    limit_req zone=api_limit burst=50 nodelay;
    limit_conn addr 50;

    # Proxy Settings
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id;
    proxy_cache_bypass $http_upgrade;
    proxy_buffering off;

    # Timeout Settings
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Health check endpoint (bypass rate limiting)
    location /health {
        proxy_pass http://brandpulse_api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        limit_req off;
        limit_conn off;
        access_log off;
    }

    # API endpoints
    location / {
        proxy_pass http://brandpulse_api;
        proxy_intercept_errors off;
    }

    # WebSocket support
    location /ws {
        proxy_pass http://brandpulse_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # Static file caching
    location /static {
        proxy_pass http://brandpulse_api;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, immutable";
    }

    # Block hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# =============================================================================
# HTTPS Server - Dashboard
# =============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dashboard.rtmn.io;

    # SSL Certificate Configuration
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # SSL Protocols and Ciphers
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;

    # SSL Session Configuration
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://api.rtmn.io wss://api.rtmn.io" always;

    # Rate Limiting
    limit_req zone=api_limit burst=100 nodelay;
    limit_conn addr 100;

    # Proxy Settings
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
    proxy_buffering off;

    # SPA fallback - serve index.html for all routes
    location / {
        proxy_pass http://brandpulse_dashboard;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SPA support
        try_files $uri $uri/ /index.html;
    }

    # Static assets with caching
    location /_next/static {
        proxy_pass http://brandpulse_dashboard;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, immutable";
        expires 60m;
        add_header ETag "";
    }

    # Static images
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|avif)$ {
        proxy_pass http://brandpulse_dashboard;
        proxy_cache_valid 200 30m;
        add_header Cache-Control "public, max-age=30d";
        expires 30d;
    }

    # Static fonts
    location ~* \.(woff|woff2|ttf|otf|eot)$ {
        proxy_pass http://brandpulse_dashboard;
        proxy_cache_valid 200 30m;
        add_header Cache-Control "public, max-age=30d";
        expires 30d;
    }

    # Block hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
