# Exhibition OS - One-Command Start
# Run: docker-compose -f docker-compose.exhibition.yml up -d

version: '3.8'

services:
  # MongoDB - single instance
  mongodb:
    image: mongo:6.0
    container_name: exhibition-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_exhibition:/data/db
    networks:
      - exhibition-net

  # Redis
  redis:
    image: redis:7-alpine
    container_name: exhibition-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_exhibition:/data
    networks:
      - exhibition-net

  # Gateway
  gateway:
    build: ./exhibition-os
    container_name: exhibition-gateway
    restart: unless-stopped
    ports:
      - "5040:5040"
    environment:
      - NODE_ENV=production
      - PORT=5040
    networks:
      - exhibition-net

  # All microservices
  organizer:
    build: ./packages/exhibition-organizer-service
    container_name: exhibition-organizer
    restart: unless-stopped
    ports:
      - "5041:5041"
    environment:
      - NODE_ENV=production
      - PORT=5041
    networks:
      - exhibition-net

  exhibitor:
    build: ./packages/exhibition-exhibitor-service
    container_name: exhibition-exhibitor
    restart: unless-stopped
    ports:
      - "5042:5042"
    environment:
      - NODE_ENV=production
      - PORT=5042
    networks:
      - exhibition-net

  attendee:
    build: ./packages/exhibition-attendee-service
    container_name: exhibition-attendee
    restart: unless-stopped
    ports:
      - "5043:5043"
    environment:
      - NODE_ENV=production
      - PORT=5043
    networks:
      - exhibition-net

  twin:
    build: ./packages/exhibition-twin-service
    container_name: exhibition-twin
    restart: unless-stopped
    ports:
      - "5044:5044"
    environment:
      - NODE_ENV=production
      - PORT=5044
    networks:
      - exhibition-net

  badge:
    build: ./packages/exhibition-badge-service
    container_name: exhibition-badge
    restart: unless-stopped
    ports:
      - "5045:5045"
    environment:
      - NODE_ENV=production
      - PORT=5045
    networks:
      - exhibition-net

  analytics:
