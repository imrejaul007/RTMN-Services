<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Genie AI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #ffffff;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-icon {
      font-size: 32px;
    }

    .header-text h1 {
      font-size: 18px;
      font-weight: 600;
    }

    .header-text p {
      font-size: 12px;
      opacity: 0.9;
    }

    .content {
      padding: 16px;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px;
      background: #f8f9fa;
      border-radius: 8px;
      margin-bottom: 16px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #10b981;
    }

    .status-dot.offline {
      background: #ef4444;
    }

    .status-text {
      font-size: 13px;
      color: #6c757d;
    }

    .quick-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }

    .quick-action {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 16px 8px;
      background: #f8f9fa;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .quick-action:hover {
      background: #e9ecef;
      transform: translateY(-2px);
    }

    .quick-action-icon {
      font-size: 24px;
    }

    .quick-action-text {
      font-size: 12px;
      color: #495057;
    }

    .memory-stats {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
    }

    .stats-title {
      font-size: 12px;
      color: #6c757d;
      margin-bottom: 8px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .stat-item {
      text-align: center;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 600;
      color: #667eea;
    }

    .stat-label {
      font-size: 11px;
      color: #6c757d;
    }

    .settings-link {
      display: block;
      text-align: center;
      padding: 12px;
      background: #f8f9fa;
      border-radius: 8px;
      color: #667eea;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
    }

    .settings-link:hover {
      background: #e9ecef;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: #1a1a2e;
        color: #e0e0e0;
      }

      .status, .quick-action, .memory-stats, .settings-link {
        background: #16213e;
      }

      .quick-action:hover, .settings-link:hover {
        background: #2a2a4a;
      }

      .quick-action-text, .stats-title, .stat-label {
        color: #a0a0a0;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-icon">🧞</span>
    <div class="header-text">
      <h1>Genie AI</h1>
      <p>Your Personal AI Assistant</p>
    </div>
  </div>

  <div class="content">
    <div class="status">
      <div class="status-dot" id="status-dot"></div>
      <span class="status-text" id="status-text">Checking services...</span>
    </div>

    <div class="quick-actions">
      <button class="quick-action" id="btn-ask">
        <span class="quick-action-icon">💬</span>
        <span class="quick-action-text">Ask Genie</span>
      </button>
      <button class="quick-action" id="btn-summarize">
        <span class="quick-action-icon">📝</span>
        <span class="quick-action-text">Summarize Page</span>
      </button>
      <button class="quick-action" id="btn-save">
        <span class="quick-action-icon">💾</span>
        <span class="quick-action-text">Save to Memory</span>
      </button>
      <button class="quick-action" id="btn-calendar">
        <span class="quick-action-icon">📅</span>
        <span class="quick-action-text">Calendar</span>
      </button>
    </div>

    <div class="memory-stats">
      <div class="stats-title">Your Genie Stats</div>
      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-value" id="pages-saved">0</div>
          <div class="stat-label">Pages Saved</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="contexts">0</div>
          <div class="stat-label">Contexts</div>
        </div>
      </div>
    </div>

    <a href="#" class="settings-link" id="btn-settings">⚙️ Open Settings</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
