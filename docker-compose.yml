# ============================================


# ============================================
# PHASE 0-5: COMMERCE STACK
# ============================================

  rtmn-unified-hub:
    build:
      context: ./services/rtmn-unified-hub
      dockerfile: Dockerfile
    container_name: rtmn-hub
    ports:
      - "4399:4399"
    environment:
      - NODE_ENV=production
      - PORT=4399
      - HUB_API_KEY=${HUB_API_KEY:-}
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-}
      - RATE_LIMIT_IP=100
      - RATE_LIMIT_TOKEN=500
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4399/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - rtmn-core
    restart: unless-stopped

