# NeXha Commerce Network - Local Development Stack
# Services: MongoDB, SUTAR Mock, Commerce Identity API, Portal
#
# Usage:
#   docker compose up          # start all services
#   docker compose down         # stop all services
#   docker compose logs -f      # watch logs
#
# Ports:
#   27017  - MongoDB
#   4799   - SUTAR Mock (CorpID, Trust, Policy, Event Bus)
#   8000   - Commerce Identity API
#   3000   - Portal (Next.js dev server)
#   8443   - HTTPS API gateway (via Caddy)
#   3001   - HTTPS portal (via Caddy)

services:
  mongodb:
    image: mongo:7
    container_name: nexha_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - nexha_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  sutar-mock:
    build:
      context: ./sutar-mock
      dockerfile: Dockerfile
    container_name: nexha_sutar_mock
    restart: unless-stopped
    ports:
      - "4799:4799"
    environment:
      - PORT=4799
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4799/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  commerce-identity:
    build:
      context: ./commerce-identity
      dockerfile: Dockerfile
    container_name: nexha_commerce_identity
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      mongodb:
        condition: service_healthy
      sutar-mock:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - PORT=8000
      - LOG_LEVEL=info
      - MONGODB_URI=mongodb://mongodb:27017/nexha_commerce_identity
      - SUTAR_BASE_URL=http://sutar-mock:4799
      - SUTAR_IDENTITY_URL=http://sutar-mock:4799
      - SUTAR_REPUTATION_URL=http://sutar-mock:4799
      - SUTAR_DECISION_URL=http://sutar-mock:4799
      - SUTAR_EVENT_BUS_URL=http://sutar-mock:4799
      - JWT_SECRET=${JWT_SECRET:?Please set JWT_SECRET}
      - JWT_EXPIRES_IN=7d
      - JWT_ISSUER=nexha-commerce-identity
      - JWT_AUDIENCE=nexha-portal
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:?Please set INTERNAL_API_KEY}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  portal:
    build:
      context: ./portal
      dockerfile: Dockerfile
    container_name: nexha_portal
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      commerce-identity:
        condition: service_healthy

volumes:
  nexha_mongo_data:
    driver: local
