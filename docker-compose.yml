# RTMN - Real-Time Multi-Industry Network
# Complete Docker Compose Configuration
# All 24 deployable services in this repository

version: '3.8'

services:
  # ============================================
  # INFRASTRUCTURE
  # ============================================

  redis:
    image: redis:7-alpine
    container_name: rtmn-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rtmn-core

  # ============================================
  # FOUNDATION SERVICES
  # ============================================

  corpid-service:
    build:
      context: ./corpid-service
      dockerfile: Dockerfile
    container_name: rtmn-corpid-service
    ports:
      - "4702:4702"
    environment:
      - PORT=4702
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4702/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - rtmn-core

  memory-os:
