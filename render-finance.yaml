# Render Blueprint - HOJAI FinanceOS Services
# Deploy all 14 FinanceOS services to Render

services:
  # ============================================
  # FINANCE AI AGENTS (Ports 4900-4906)
  # ============================================

  - type: web
    name: rtmn-finance-cfo
    env: node
    region: singapore
    plan: starter
    rootDir: companies/hojai-ai/finance-cfo
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /health
    ports:
      - 4900
    envVars:
      - key: PORT
        value: 4900
      - key: NODE_ENV
        value: production

  - type: web
    name: rtmn-finance-accountant
    env: node
    region: singapore
