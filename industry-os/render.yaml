# Render Blueprint - RTMN Industry Operating Systems
# All 24 Industry OS with MongoDB + Auth + CRM + 15 Layers

services:
  # ============================================
  # RESTAURANT (Port 5010)
  # ============================================
  - type: web
    name: rtmn-restaurant-os
    env: node
    region: singapore
    plan: free
    rootDir: services/restaurant-os
    healthCheckPath: /health
    ports:
      - 5010
    envVars:
      - key: PORT
        value: 5010
      - key: NODE_ENV
        value: production
      - key: INDUSTRY
        value: restaurant
      - key: MONGODB_URI
        sync: false
      - key: CRM_HUB_URL
        value: https://rez-crm-hub.onrender.com
      - key: GENIE_URL
        value: https://hojai-genie.onrender.com
      - key: COPILOT_URL
        value: https://hojai-copilot.onrender.com
      - key: NEXHA_URL
        value: https://nexha.onrender.com
      - key: WALLET_URL
        value: https://rez-wallet.onrender.com

